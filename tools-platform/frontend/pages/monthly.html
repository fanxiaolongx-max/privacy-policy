<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月度综合运营报告 - Tools Platform</title>
    <link rel="stylesheet" href="/css/shared.css">
    <style>
        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #333;
        }

        .page-container {
            padding-top: calc(var(--navbar-h) + 20px);
            max-width: 1200px;
            margin: 0 auto;
            padding-left: 20px;
            padding-right: 20px;
            padding-bottom: 40px;
        }

        .report-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .report-header h2 {
            font-size: 28px;
            color: #00285e;
            /* Huawei-like dark blue */
            letter-spacing: 2px;
            margin: 0 0 10px 0;
            font-weight: 600;
        }

        .report-header p {
            color: #666;
            font-size: 14px;
            margin: 0;
        }

        .section-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            padding: 24px;
            margin-bottom: 24px;
            border-top: 4px solid #00285e;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: "";
            display: inline-block;
            width: 4px;
            height: 18px;
            background: #e31837;
            /* Red accent */
        }

        .summary-text {
            font-size: 15px;
            line-height: 1.8;
            color: #444;
            text-align: justify;
        }

        .summary-highlight {
            font-weight: bold;
            color: #e31837;
        }

        .charts-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .chart-container {
            flex: 1;
            min-width: 500px;
            height: 380px;
            background: #fafafa;
            border-radius: 4px;
            border: 1px solid #eee;
        }

        .snapshot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .ranking-table,
        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .ranking-table th,
        .matrix-table th {
            background: #f4f6f8;
            padding: 12px;
            text-align: left;
            border: 1px solid #ddd;
            font-weight: 600;
            color: #333;
        }

        .ranking-table td,
        .matrix-table td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }

        .ranking-table tr:hover,
        .matrix-table tr:hover {
            background: #f9f9f9;
        }

        .score-good {
            color: #2e7d32;
            font-weight: bold;
        }

        .score-bad {
            color: #d32f2f;
            font-weight: bold;
        }

        .loader {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 16px;
        }

        .matrix-container {
            overflow-x: auto;
        }

        .filter-btn {
            padding: 6px 12px;
            background: #f0f2f5;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            background: #e8eaf6;
            border-color: #c5cae9;
        }

        .filter-btn.active {
            background: #00285e;
            color: #fff;
            border-color: #00285e;
        }
    </style>
</head>

<body>
    <div class="page-container">
        <div class="report-header">
            <h2>月度运营质量与合规分析报告 <span style="font-size:14px;color:#94a3b8;font-weight:normal;margin-left:8px;">v1.0.0</span></h2>
            <p id="report-date-range">分析周期: 加载中...</p>
            <div id="date-filter-container" style="margin-top: 15px; display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap;">
                <div style="display: flex; gap: 8px;">
                    <button class="filter-btn" data-days="7">最近 7 天</button>
                    <button class="filter-btn" data-days="30">最近 30 天</button>
                    <button class="filter-btn" data-days="90">最近 90 天</button>
                    <button class="filter-btn" data-days="all">全部</button>
                </div>
                <div style="display: flex; gap: 8px; align-items: center; margin-left: 15px;">
                    <input type="date" id="filter-start-date" style="padding: 6px; border: 1px solid #ccc; border-radius: 4px;">
                    <span>至</span>
                    <input type="date" id="filter-end-date" style="padding: 6px; border: 1px solid #ccc; border-radius: 4px;">
                    <button id="custom-filter-btn" style="padding: 6px 12px; background: #00285e; color: #fff; border: none; border-radius: 4px; cursor: pointer;">筛选</button>
                </div>
            </div>
            <div id="export-actions" style="margin-top: 15px; display: none; gap: 10px; justify-content: center;">
                <button onclick="exportToImage()" style="padding: 8px 16px; background: #00285e; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">🖼️ 导出为长图</button>
                <button onclick="exportToPDF()" style="padding: 8px 16px; background: #e31837; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">📄 导出为 PDF</button>
            </div>
        </div>

        <div id="loader" class="loader">
            <p>正在分析历史数据，生成月报...</p>
        </div>

        <div id="report-content" style="display: none;">
            <!-- 一、整体状况说明 -->
            <div class="section-card">
                <div class="section-title">一、整体状况与关键结论</div>
                <div class="summary-text" id="summary-content">
                    <!-- JS generated -->
                </div>
            </div>

            <!-- 二、历史趋势分析 -->
            <div class="section-card">
                <div class="section-title">二、历史趋势与波动分析</div>
                <div class="charts-row">
                    <div id="chart-overall" class="chart-container"></div>
                    <div id="chart-groups" class="chart-container"></div>
                </div>
            </div>

            <!-- 三、最新快照分析 -->
            <div class="section-card">
                <div class="section-title">三、最新运行快照与短板透视 (基准: <span id="latest-snapshot-date"></span>)</div>
                <div style="margin-bottom: 20px;">
                    <h4 style="margin: 0 0 10px 0; color: #555;">3.1 客户群达标排名及加减分详情</h4>
                    <div style="overflow-x: auto;">
                        <table class="ranking-table" id="ranking-table">
                            <thead>
                                <tr>
                                    <th width="80">排名</th>
                                    <th>客户群名称</th>
                                    <th>基准得分</th>
                                    <th>加减分项</th>
                                    <th>最终得分</th>
                                    <th>评级</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- JS generated -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <div>
                    <h4 style="margin: 0 0 10px 0; color: #555;">3.2 客户群短板透视矩阵 (不达标项)</h4>
                    <div class="matrix-container">
                        <table class="matrix-table" id="matrix-table">
                            <thead>
                                <tr>
                                    <th>指标名称</th>
                                    <th>目标值</th>
                                    <th>未达标客户群及实测值</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- JS generated -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="manual-score-section" style="display: none; margin-top: 20px;">
                    <h4 style="margin: 0 0 10px 0; color: #555;">3.3 手工考核加减分明细</h4>
                    <div style="overflow-x: auto;">
                        <table class="ranking-table" id="manual-score-table">
                            <thead>
                                <tr>
                                    <th>客户群名称</th>
                                    <th>手工调整分数</th>
                                    <th>说明</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- JS generated -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="full-report-section" style="margin-top: 30px;">
                    <h4 style="margin: 0 0 10px 0; color: #555;">3.4 完整考核快照数据一览</h4>
                    <div id="full-report-content"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="/js/shared/toast.js"></script>
    <script src="/js/shared/api.js"></script>
    <script src="/js/shared/navbar.js"></script>
    <script src="/js/report/monthly.js"></script>
</body>

</html>
