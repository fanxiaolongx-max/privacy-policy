<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="数据探索 - DB Explorer">数据探索 - DB Explorer</title>
    <link rel="stylesheet" href="/css/shared.css?v=20260612-01">
    <style>
        body {
            background: #f4f6f8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #333;
        }

        .page-container {
            padding-top: calc(var(--navbar-h) + 20px);
            max-width: 1440px;
            margin: 0 auto;
            padding-left: 20px;
            padding-right: 20px;
            padding-bottom: 40px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .controls h2 {
            margin: 0;
            color: #2c3e50;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            padding: 24px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .table-selector-group {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 20px;
        }

        select, input[type="number"] {
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
        }

        .btn-primary {
            padding: 8px 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-secondary {
            padding: 8px 16px;
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .btn-secondary:disabled, .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .data-table-container {
            width: 100%;
            overflow-x: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #f8fafc;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
            color: #475569;
            font-weight: 600;
            white-space: nowrap;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        td.expanded {
            white-space: pre-wrap;
            word-break: break-all;
            background: #fdfdfd;
        }

        td:hover {
            background: #f8fafc;
        }
        
        .json-cell {
            font-family: monospace;
            color: #059669;
            cursor: pointer;
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            font-size: 14px;
            color: #64748b;
        }
        
        .page-info {
            font-weight: 600;
            color: #334155;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
    </style>
</head>

<body>
    <div class="page-container">
        <div class="controls">
            <h2><span data-i18n="🗄️ 数据探索 (DB Explorer)">🗄️ 数据探索 (DB Explorer)</span></h2>
            <div style="font-size: 13px; color: #64748b;" data-i18n="仅超级管理员可访问">
                仅超级管理员可访问
            </div>
        </div>

        <div class="card">
            <div class="table-selector-group">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <label style="font-weight: 600; color: #475569;" data-i18n="选择数据表:">选择数据表:</label>
                    <select id="table-select" style="min-width: 250px;">
                        <option value="" data-i18n="加载中...">加载中...</option>
                    </select>
                </div>
                
                <button class="btn-primary" onclick="loadTableData(true)" data-i18n="🔄 刷新数据">🔄 刷新数据</button>
            </div>

            <div id="table-content-area" style="display: none;">
                <div class="data-table-container">
                    <table id="data-table">
                        <thead>
                            <tr id="table-head"></tr>
                        </thead>
                        <tbody id="table-body">
                        </tbody>
                    </table>
                </div>

                <div class="pagination">
                    <div>
                        <span data-i18n="共 ">共 </span><span class="page-info" id="total-rows">0</span><span data-i18n=" 条记录"> 条记录</span> 
                        <span data-i18n=" | 每页显示 "> | 每页显示 </span>
                        <select id="limit-select" onchange="loadTableData(true)" style="padding: 4px 8px;">
                            <option value="50">50</option>
                            <option value="100" selected>100</option>
                            <option value="500">500</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <button class="btn-secondary" id="btn-prev" onclick="prevPage()" data-i18n="上一页">上一页</button>
                        <span><span data-i18n="第 ">第 </span><span class="page-info" id="current-page">1</span><span data-i18n=" 页 / 共 "> 页 / 共 </span><span class="page-info" id="total-pages">1</span><span data-i18n=" 页"> 页</span></span>
                        <button class="btn-secondary" id="btn-next" onclick="nextPage()" data-i18n="下一页">下一页</button>
                    </div>
                </div>
            </div>
            
            <div id="loading-state" class="empty-state" data-i18n="请在上方选择数据表">
                请在上方选择数据表
            </div>
        </div>
    </div>

    <script src="/js/shared/api.js?v=20260612-02"></script>
    <script src="/js/shared/toast.js?v=20260530-01"></script>
    <script src="/js/shared/navbar.js?v=20260612-01"></script>
    
    <script>
        // ================== 双语切换引擎 ==================
        const I18N_DICT = {
            "数据探索 - DB Explorer": "DB Explorer - Tools Platform",
            "🗄️ 数据探索 (DB Explorer)": "🗄️ DB Explorer",
            "仅超级管理员可访问": "Super admin only",
            "选择数据表:": "Select Table:",
            "加载中...": "Loading...",
            "🔄 刷新数据": "🔄 Refresh Data",
            "共 ": "Total ",
            " 条记录": " records",
            " | 每页显示 ": " | Per page ",
            "上一页": "Prev",
            "第 ": "Page ",
            " 页 / 共 ": " / Total ",
            " 页": " ",
            "下一页": "Next",
            "请在上方选择数据表": "Please select a table above",
            "无可用数据表": "No available tables",
            "-- 请选择 --": "-- Select --",
            "⚠️ 权限不足，仅超级管理员可访问。": "⚠️ Permission denied, super admin only.",
            "⏳ 正在加载数据...": "⏳ Loading data...",
            "暂无数据": "No data",
            "❌ 加载失败: ": "❌ Load Failed: "
        };

        let currentLang = 'zh';

        function applyLanguage(lang) {
            if (currentLang === lang) return;
            currentLang = lang;
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (currentLang === 'en' && I18N_DICT[key]) el.innerHTML = I18N_DICT[key];
                else el.innerHTML = key;
            });
            
            // Re-render select placeholder if possible
            const loadingState = document.getElementById('loading-state');
            if (loadingState && loadingState.innerHTML.includes('❌') && currentLang === 'en') {
                loadingState.innerHTML = loadingState.innerHTML.replace('加载失败: ', 'Load Failed: ');
            }
        }

        function tText(zh, en) {
            return currentLang === 'en' ? en : zh;
        }

        window.addEventListener('tools:languagechange', (e) => {
            const isEn = e.detail?.lang?.startsWith('en');
            applyLanguage(isEn ? 'en' : 'zh');
            loadTableData(); // re-render table to translate static parts
        });

        const storedLang = localStorage.getItem('tools_lang') || navigator.language || 'zh';
        applyLanguage(storedLang.startsWith('en') ? 'en' : 'zh');
        // ==================================================

        let currentOffset = 0;
        let currentTotal = 0;

        async function init() {
            try {
                const tables = await API.get('/api/db-explorer/tables');
                const select = document.getElementById('table-select');
                
                if (!tables || tables.length === 0) {
                    select.innerHTML = `<option value="">${tText('无可用数据表', 'No available tables')}</option>`;
                    return;
                }
                
                select.innerHTML = `<option value="">${tText('-- 请选择 --', '-- Select --')}</option>` + 
                    tables.map(t => `<option value="${t}">${t}</option>`).join('');
                    
                select.addEventListener('change', () => {
                    if (select.value) loadTableData(true);
                });
            } catch (err) {
                console.error(err);
                if (err.message.includes('403') || err.message.includes('权限')) {
                    document.getElementById('loading-state').innerHTML = tText('⚠️ 权限不足，仅超级管理员可访问。', '⚠️ Permission denied, super admin only.');
                }
            }
        }

        async function loadTableData(reset = false) {
            const table = document.getElementById('table-select').value;
            if (!table) return;

            const limit = parseInt(document.getElementById('limit-select').value, 10);
            if (reset) currentOffset = 0;

            const loading = document.getElementById('loading-state');
            const content = document.getElementById('table-content-area');
            
            loading.style.display = 'block';
            loading.innerHTML = tText('⏳ 正在加载数据...', '⏳ Loading data...');
            content.style.display = 'none';

            try {
                const data = await API.get(`/api/db-explorer/tables/${table}?limit=${limit}&offset=${currentOffset}`);
                
                currentTotal = data.total;
                
                // Render headers
                const thead = document.getElementById('table-head');
                thead.innerHTML = data.schema.map(col => `<th>${col.name} <span style="font-size:11px;color:#94a3b8;font-weight:normal;">(${col.type})</span></th>`).join('');
                
                // Render body
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '';
                
                if (data.rows.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="${data.schema.length}" style="text-align:center;color:#94a3b8;">${tText('暂无数据', 'No data')}</td></tr>`;
                } else {
                    data.rows.forEach(row => {
                        const tr = document.createElement('tr');
                        data.schema.forEach(col => {
                            const td = document.createElement('td');
                            let val = row[col.name];
                            
                            if (val === null) {
                                td.innerHTML = '<span style="color:#cbd5e1;font-style:italic;">NULL</span>';
                            } else if (typeof val === 'object') {
                                // If for some reason it returns an object (sqlite driver might do this for JSON if parsed, but usually string)
                                td.textContent = JSON.stringify(val);
                                td.className = 'json-cell';
                                td.onclick = () => td.classList.toggle('expanded');
                            } else {
                                const strVal = String(val);
                                td.textContent = strVal;
                                // Basic heurustic for JSON string detection
                                if ((strVal.startsWith('{') && strVal.endsWith('}')) || (strVal.startsWith('[') && strVal.endsWith(']'))) {
                                    td.className = 'json-cell';
                                    td.onclick = () => {
                                        if (td.classList.contains('expanded')) {
                                            td.classList.remove('expanded');
                                            td.textContent = strVal; // Collapse
                                        } else {
                                            try {
                                                const parsed = JSON.parse(strVal);
                                                td.textContent = JSON.stringify(parsed, null, 2);
                                            } catch (e) {
                                                // ignore error if not valid JSON
                                            }
                                            td.classList.add('expanded');
                                        }
                                    };
                                }
                            }
                            tr.appendChild(td);
                        });
                        tbody.appendChild(tr);
                    });
                }

                // Update pagination
                document.getElementById('total-rows').textContent = currentTotal;
                const totalPages = Math.ceil(currentTotal / limit) || 1;
                const currentPage = Math.floor(currentOffset / limit) + 1;
                
                document.getElementById('current-page').textContent = currentPage;
                document.getElementById('total-pages').textContent = totalPages;
                
                document.getElementById('btn-prev').disabled = currentPage <= 1;
                document.getElementById('btn-next').disabled = currentPage >= totalPages;

                loading.style.display = 'none';
                content.style.display = 'block';
            } catch (err) {
                console.error(err);
                loading.innerHTML = `${tText('❌ 加载失败: ', '❌ Load Failed: ')}${err.message}`;
            }
        }

        function nextPage() {
            const limit = parseInt(document.getElementById('limit-select').value, 10);
            if (currentOffset + limit < currentTotal) {
                currentOffset += limit;
                loadTableData(false);
            }
        }

        function prevPage() {
            const limit = parseInt(document.getElementById('limit-select').value, 10);
            if (currentOffset - limit >= 0) {
                currentOffset -= limit;
                loadTableData(false);
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
