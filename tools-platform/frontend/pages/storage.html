<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="存储迁移状态 - Tools Platform">存储迁移状态 - Tools Platform</title>
    <link rel="stylesheet" href="/css/shared.css?v=20260612-01">
    <style>
        body {
            background:
                radial-gradient(circle at top left, rgba(14, 165, 233, 0.16), transparent 30%),
                radial-gradient(circle at top right, rgba(34, 197, 94, 0.14), transparent 28%),
                linear-gradient(180deg, #07111f 0%, #0f172a 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }
        .storage-wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: calc(var(--navbar-h) + 36px) 24px 48px;
        }
        .storage-hero {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 18px;
            flex-wrap: wrap;
            margin-bottom: 26px;
        }
        .storage-title {
            font-size: 34px;
            font-weight: 800;
            margin: 0 0 10px;
            letter-spacing: -0.4px;
        }
        .storage-subtitle {
            margin: 0;
            color: #94a3b8;
            line-height: 1.7;
        }
        .storage-refresh {
            height: 40px;
            border-radius: 12px;
            border: 1px solid rgba(125, 211, 252, 0.25);
            background: rgba(15, 23, 42, 0.6);
            color: #e2e8f0;
            padding: 0 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .storage-refresh:hover,
        .diff-toggle:hover {
            border-color: rgba(125, 211, 252, 0.52);
            background: rgba(14, 165, 233, 0.16);
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 22px;
        }
        .summary-card {
            background: rgba(15, 23, 42, 0.72);
            border: 1px solid rgba(148, 163, 184, 0.16);
            border-radius: 18px;
            padding: 18px 20px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
        }
        .summary-label {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .summary-value {
            font-size: 28px;
            font-weight: 800;
            color: #f8fafc;
        }
        .summary-value.ok { color: #4ade80; }
        .summary-value.warn { color: #fbbf24; }
        .summary-value.info { color: #7dd3fc; }
        .status-meta {
            margin-bottom: 18px;
            color: #94a3b8;
            font-size: 12px;
        }
        .table-list {
            display: grid;
            gap: 14px;
        }
        .table-card {
            background: rgba(15, 23, 42, 0.74);
            border: 1px solid rgba(148, 163, 184, 0.14);
            border-radius: 18px;
            padding: 18px 20px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
        }
        .table-head {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 14px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .table-name {
            font-size: 20px;
            font-weight: 700;
            color: #f8fafc;
            margin: 0 0 6px;
        }
        .table-scope {
            color: #94a3b8;
            font-size: 12px;
        }
        .badge-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.2px;
            border: 1px solid transparent;
        }
        .badge.ok {
            color: #86efac;
            background: rgba(34, 197, 94, 0.14);
            border-color: rgba(34, 197, 94, 0.24);
        }
        .badge.info {
            color: #93c5fd;
            background: rgba(59, 130, 246, 0.14);
            border-color: rgba(59, 130, 246, 0.26);
        }
        .badge.warn {
            color: #fde68a;
            background: rgba(245, 158, 11, 0.14);
            border-color: rgba(245, 158, 11, 0.26);
        }
        .order-note {
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid rgba(125, 211, 252, 0.18);
            background: rgba(14, 165, 233, 0.08);
            color: #bae6fd;
            font-size: 12px;
            line-height: 1.6;
        }
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }
        .metric-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 14px;
            padding: 12px 14px;
        }
        .metric-label {
            color: #94a3b8;
            font-size: 11px;
            margin-bottom: 7px;
        }
        .metric-value {
            color: #f8fafc;
            font-size: 18px;
            font-weight: 800;
        }
        .diff-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 14px;
        }
        .diff-toggle {
            border: 1px solid rgba(251, 191, 36, 0.32);
            background: rgba(245, 158, 11, 0.12);
            color: #fde68a;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
        }
        .diff-panel {
            display: none;
            margin-top: 14px;
            border: 1px solid rgba(251, 191, 36, 0.2);
            background: rgba(15, 23, 42, 0.86);
            border-radius: 16px;
            overflow: hidden;
        }
        .diff-panel.open {
            display: block;
        }
        .diff-summary {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0;
            border-bottom: 1px solid rgba(148, 163, 184, 0.14);
        }
        .diff-summary-item {
            padding: 12px 14px;
            border-right: 1px solid rgba(148, 163, 184, 0.12);
        }
        .diff-summary-item:last-child {
            border-right: 0;
        }
        .diff-summary-label {
            color: #94a3b8;
            font-size: 11px;
            margin-bottom: 6px;
        }
        .diff-summary-value {
            color: #f8fafc;
            font-size: 13px;
            font-weight: 800;
            word-break: break-word;
        }
        .diff-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }
        .diff-column {
            min-width: 0;
            border-right: 1px solid rgba(148, 163, 184, 0.12);
        }
        .diff-column:last-child {
            border-right: 0;
        }
        .diff-column-head {
            padding: 10px 14px;
            color: #bae6fd;
            font-size: 12px;
            font-weight: 800;
            background: rgba(14, 165, 233, 0.08);
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
        }
        .diff-code {
            margin: 0;
            padding: 14px;
            max-height: 260px;
            overflow: auto;
            color: #dbeafe;
            font-size: 11px;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        }
        .storage-empty {
            padding: 28px;
            text-align: center;
            color: #94a3b8;
            border-radius: 18px;
            border: 1px dashed rgba(148, 163, 184, 0.22);
        }
        @media (max-width: 880px) {
            .summary-grid, .metric-grid, .diff-summary {
                grid-template-columns: 1fr 1fr;
            }
            .diff-grid {
                grid-template-columns: 1fr;
            }
            .diff-column {
                border-right: 0;
                border-bottom: 1px solid rgba(148, 163, 184, 0.12);
            }
        }
        @media (max-width: 560px) {
            .summary-grid, .metric-grid, .diff-summary {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="storage-wrap">
        <div class="storage-hero">
            <div>
                <h1 class="storage-title" data-i18n="存储迁移状态台">存储迁移状态台</h1>
                <p class="storage-subtitle" data-i18n="集中查看已迁表的真实读源、一致性校验、JSON/SQLite 数量，以及当前双写状态，便于后续从双写过渡到 SQLite 主读。">集中查看已迁表的真实读源、一致性校验、JSON/SQLite 数量，以及当前双写状态，便于后续从双写过渡到 SQLite 主读。</p>
            </div>
            <button class="storage-refresh" id="refreshStorageStatus" data-i18n="刷新状态">刷新状态</button>
        </div>

        <div class="summary-grid" id="storageSummary">
            <div class="summary-card"><div class="summary-label" data-i18n="总表数">总表数</div><div class="summary-value info">-</div></div>
            <div class="summary-card"><div class="summary-label" data-i18n="一致表数">一致表数</div><div class="summary-value ok">-</div></div>
            <div class="summary-card"><div class="summary-label" data-i18n="异常表数">异常表数</div><div class="summary-value warn">-</div></div>
            <div class="summary-card"><div class="summary-label" data-i18n="当前检查时间">当前检查时间</div><div class="summary-value" style="font-size:16px;">-</div></div>
        </div>

        <div class="status-meta" id="storageStatusMeta" data-i18n="正在加载存储迁移状态...">正在加载存储迁移状态...</div>
        <div class="table-list" id="storageTableList">
            <div class="storage-empty" data-i18n="正在加载...">正在加载...</div>
        </div>
    </div>

    <script src="/js/shared/api.js?v=20260626-01"></script>
    <script src="/js/shared/navbar.js?v=20260626-02"></script>
    <script>
        // ================== 双语切换引擎 ==================
        const I18N_DICT = {
            "存储迁移状态 - Tools Platform": "Storage Migration Status - Tools Platform",
            "存储迁移状态台": "Storage Migration Status",
            "集中查看已迁表的真实读源、一致性校验、JSON/SQLite 数量，以及当前双写状态，便于后续从双写过渡到 SQLite 主读。": "Centralized view of SQLite-only read sources, legacy JSON status, and migration checks.",
            "刷新状态": "Refresh Status",
            "总表数": "Total Tables",
            "一致表数": "Matched Tables",
            "异常表数": "Mismatched Tables",
            "当前检查时间": "Current Check Time",
            "正在加载存储迁移状态...": "Loading storage migration status...",
            "正在加载...": "Loading...",
            "运行时已切换为 SQLite-only；旧 JSON 文件不存在时显示为 JSON 已禁用。": "Runtime is SQLite-only; missing legacy JSON files are shown as JSON disabled.",
            "暂无迁移状态数据。": "No migration status data.",
            "正在重新校验迁移状态...": "Revalidating migration status...",
            "正在读取服务端迁移状态...": "Reading migration status from server...",
            "读取失败": "Read Failed",
            "加载失败: ": "Load Failed: ",
            "一致性: ": "Consistency: ",
            "顺序: 不一致": "Order: Mismatched",
            "Auto读源: ": "Auto Read: ",
            "写策略: ": "Write Strategy: ",
            "JSON 数量": "JSON Count",
            "SQLite 数量": "SQLite Count",
            "读源结果": "Read Source",
            "状态": "Status",
            "已对齐": "Aligned",
            "待排查": "Pending",
            "差异路径": "Diff Path",
            "差异原因": "Diff Reason",
            "文本差异位置": "Diff Position",
            "JSON / SQLite 长度": "JSON / SQLite Length",
            "JSON 侧预览": "JSON Preview",
            "SQLite 侧预览": "SQLite Preview",
            "JSON 文本差异片段": "JSON Diff Snippet",
            "SQLite 文本差异片段": "SQLite Diff Snippet",
            "查看差异详情": "View Diff Details",
            "收起差异详情": "Collapse Diff Details"
        };

        let currentLang = 'zh';

        function applyLanguage(lang) {
            if (currentLang === lang) return;
            currentLang = lang;
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (currentLang === 'en' && I18N_DICT[key]) el.innerHTML = I18N_DICT[key];
                else el.innerHTML = key;
            });

            if (window._lastStorageData) {
                renderSummary(window._lastStorageData);
                renderTableList(window._lastStorageData);
            }
        }

        function tText(zh, en) {
            return currentLang === 'en' ? en : zh;
        }

        window.addEventListener('tools:languagechange', (e) => {
            const isEn = e.detail?.lang?.startsWith('en');
            applyLanguage(isEn ? 'en' : 'zh');
        });

        const storedLang = localStorage.getItem('tools_lang') || navigator.language || 'zh';
        applyLanguage(storedLang.startsWith('en') ? 'en' : 'zh');
        // ==================================================
        function sourceLabel(source) {
            if (source === 'sqlite') return 'SQLite';
            if (source === 'json') return 'JSON';
            return source || '-';
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function renderDiffPanel(item, index) {
            if (item.parity !== 'mismatch' || !item.diff) return '';
            const diff = item.diff || {};
            const semantic = diff.semantic || {};
            return `
                <div class="diff-actions">
                    <button class="diff-toggle" type="button" data-diff-toggle="${index}">${tText('查看差异详情', 'View Diff Details')}</button>
                </div>
                <div class="diff-panel" id="storageDiffPanel${index}">
                    <div class="diff-summary">
                        <div class="diff-summary-item">
                            <div class="diff-summary-label">${tText('差异路径', 'Diff Path')}</div>
                            <div class="diff-summary-value">${escapeHtml(semantic.path || '-')}</div>
                        </div>
                        <div class="diff-summary-item">
                            <div class="diff-summary-label">${tText('差异原因', 'Diff Reason')}</div>
                            <div class="diff-summary-value">${escapeHtml(semantic.reason || tText('文本内容不一致', 'Text content mismatch'))}</div>
                        </div>
                        <div class="diff-summary-item">
                            <div class="diff-summary-label">${tText('文本差异位置', 'Diff Position')}</div>
                            <div class="diff-summary-value">${diff.firstDiffIndex ?? '-'}</div>
                        </div>
                        <div class="diff-summary-item">
                            <div class="diff-summary-label">${tText('JSON / SQLite 长度', 'JSON / SQLite Length')}</div>
                            <div class="diff-summary-value">${diff.jsonLength ?? '-'} / ${diff.sqliteLength ?? '-'}</div>
                        </div>
                    </div>
                    <div class="diff-grid">
                        <div class="diff-column">
                            <div class="diff-column-head">${tText('JSON 侧预览', 'JSON Preview')}</div>
                            <pre class="diff-code">${escapeHtml(semantic.jsonPreview || diff.jsonExcerpt || '-')}</pre>
                        </div>
                        <div class="diff-column">
                            <div class="diff-column-head">${tText('SQLite 侧预览', 'SQLite Preview')}</div>
                            <pre class="diff-code">${escapeHtml(semantic.sqlitePreview || diff.sqliteExcerpt || '-')}</pre>
                        </div>
                    </div>
                    <div class="diff-grid">
                        <div class="diff-column">
                            <div class="diff-column-head">${tText('JSON 文本差异片段', 'JSON Diff Snippet')}</div>
                            <pre class="diff-code">${escapeHtml(diff.jsonExcerpt || '-')}</pre>
                        </div>
                        <div class="diff-column">
                            <div class="diff-column-head">${tText('SQLite 文本差异片段', 'SQLite Diff Snippet')}</div>
                            <pre class="diff-code">${escapeHtml(diff.sqliteExcerpt || '-')}</pre>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderOrderNote(item) {
            if (!item.orderDiff) return '';
            const order = item.orderDiff;
            return `
                <div class="order-note">
                    ${tText('顺序提示：', 'Order Note: ')}${escapeHtml(order.message || tText('JSON 与 SQLite 列表顺序不同。', 'JSON and SQLite list orders differ.'))}
                    ${tText('第一处顺序差异在第 ', 'First difference at index ')}${Number(order.firstIndex ?? 0) + 1}${tText(' 条：', ': ')}
                    ${tText('JSON 为「', 'JSON is [')}${escapeHtml(order.jsonKey || '-')}${tText('」，SQLite 为「', '], SQLite is [')}${escapeHtml(order.sqliteKey || '-')}${tText('」。', '].')}
                </div>
            `;
        }

        function renderSummary(data) {
            const summary = data.summary || {};
            const checkedAt = data.checkedAt ? new Date(data.checkedAt).toLocaleString('zh-CN', { hour12: false }) : '-';
            document.getElementById('storageSummary').innerHTML = `
                <div class="summary-card"><div class="summary-label" data-i18n="总表数">${tText('总表数', 'Total Tables')}</div><div class="summary-value info">${summary.totalTables ?? '-'}</div></div>
                <div class="summary-card"><div class="summary-label" data-i18n="JSON 已禁用">${tText('JSON 已禁用', 'JSON Disabled')}</div><div class="summary-value ok">${summary.disabledJsonTables ?? '-'}</div></div>
                <div class="summary-card"><div class="summary-label" data-i18n="异常表数">${tText('异常表数', 'Mismatched Tables')}</div><div class="summary-value warn">${summary.mismatchedTables ?? '-'}</div></div>
                <div class="summary-card"><div class="summary-label" data-i18n="当前检查时间">${tText('当前检查时间', 'Current Check Time')}</div><div class="summary-value" style="font-size:16px;">${checkedAt}</div></div>
            `;
            document.getElementById('storageStatusMeta').textContent = tText('运行时已切换为 SQLite-only；旧 JSON 文件不存在时显示为 JSON 已禁用。', 'Runtime is SQLite-only; missing legacy JSON files are shown as JSON disabled.');
        }

        function parityBadge(item) {
            if (item.parity === 'json-disabled') {
                return `<span class="badge ok">${tText('状态: JSON 已禁用', 'Status: JSON Disabled')}</span>`;
            }
            return `<span class="badge ${item.parity === 'match' ? 'ok' : 'warn'}">${tText('一致性: ', 'Consistency: ')}${item.parity === 'match' ? 'MATCH' : 'MISMATCH'}</span>`;
        }

        function statusText(item) {
            if (item.parity === 'json-disabled') return tText('SQLite 生效', 'SQLite Active');
            return item.parity === 'match' ? tText('已对齐', 'Aligned') : tText('待排查', 'Pending');
        }

        function renderTableList(data) {
            const tables = Array.isArray(data.tables) ? data.tables : [];
            const list = document.getElementById('storageTableList');
            if (!tables.length) {
                list.innerHTML = `<div class="storage-empty" data-i18n="暂无迁移状态数据。">${tText('暂无迁移状态数据。', 'No migration status data.')}</div>`;
                return;
            }

            list.innerHTML = tables.map((item, index) => `
                <section class="table-card">
                    <div class="table-head">
                        <div>
                            <h2 class="table-name">${item.label}</h2>
                            <div class="table-scope">${tText('作用域: ', 'Scope: ')}${item.scope}${tText(' · 表键: ', ' · Key: ')}${item.key}</div>
                        </div>
                        <div class="badge-row">
                            ${parityBadge(item)}
                            ${item.orderDiff ? `<span class="badge warn">${tText('顺序: 不一致', 'Order: Mismatched')}</span>` : ''}
                            <span class="badge info">${tText('Auto读源: ', 'Auto Read: ')}${sourceLabel(item.autoSource)}</span>
                            <span class="badge info">${tText('写策略: ', 'Write Strategy: ')}${item.writeStrategy}</span>
                        </div>
                    </div>
                    <div class="metric-grid">
                        <div class="metric-box">
                            <div class="metric-label" data-i18n="JSON 数量">${tText('JSON 数量', 'JSON Count')}</div>
                            <div class="metric-value">${item.jsonCount ?? '-'}</div>
                        </div>
                        <div class="metric-box">
                            <div class="metric-label" data-i18n="SQLite 数量">${tText('SQLite 数量', 'SQLite Count')}</div>
                            <div class="metric-value">${item.sqliteCount ?? '-'}</div>
                        </div>
                        <div class="metric-box">
                            <div class="metric-label" data-i18n="读源结果">${tText('读源结果', 'Read Source')}</div>
                            <div class="metric-value">${sourceLabel(item.autoSource)}</div>
                        </div>
                        <div class="metric-box">
                            <div class="metric-label" data-i18n="状态">${tText('状态', 'Status')}</div>
                            <div class="metric-value">${statusText(item)}</div>
                        </div>
                    </div>
                    ${renderOrderNote(item)}
                    ${renderDiffPanel(item, index)}
                </section>
            `).join('');

            list.querySelectorAll('[data-diff-toggle]').forEach(button => {
                button.addEventListener('click', () => {
                    const idx = button.getAttribute('data-diff-toggle');
                    const panel = document.getElementById(`storageDiffPanel${idx}`);
                    const isOpen = panel.classList.toggle('open');
                    button.textContent = isOpen ? tText('收起差异详情', 'Collapse Diff Details') : tText('查看差异详情', 'View Diff Details');
                });
            });
        }

        async function loadStorageStatus() {
            const list = document.getElementById('storageTableList');
            const meta = document.getElementById('storageStatusMeta');
            list.innerHTML = `<div class="storage-empty" data-i18n="正在重新校验迁移状态...">${tText('正在重新校验迁移状态...', 'Revalidating migration status...')}</div>`;
            meta.textContent = tText('正在读取服务端迁移状态...', 'Reading migration status from server...');
            try {
                const data = await API.get('/api/storage/status');
                window._lastStorageData = data;
                renderSummary(data);
                renderTableList(data);
            } catch (err) {
                meta.textContent = tText('读取失败', 'Read Failed');
                list.innerHTML = `<div class="storage-empty" data-i18n="加载失败: ">${tText('加载失败: ', 'Load Failed: ')}${err.message}</div>`;
            }
        }

        document.getElementById('refreshStorageStatus').addEventListener('click', loadStorageStatus);
        loadStorageStatus();
    </script>
</body>
</html>
