<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>存储迁移状态 - Tools Platform</title>
    <link rel="stylesheet" href="/css/shared.css">
    <style>
        body {
            background:
                radial-gradient(circle at top left, rgba(14, 165, 233, 0.16), transparent 30%),
                radial-gradient(circle at top right, rgba(34, 197, 94, 0.14), transparent 28%),
                linear-gradient(180deg, #07111f 0%, #0f172a 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }
        .storage-wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: calc(var(--navbar-h) + 36px) 24px 48px;
        }
        .storage-hero {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 18px;
            flex-wrap: wrap;
            margin-bottom: 26px;
        }
        .storage-title {
            font-size: 34px;
            font-weight: 800;
            margin: 0 0 10px;
            letter-spacing: -0.4px;
        }
        .storage-subtitle {
            margin: 0;
            color: #94a3b8;
            line-height: 1.7;
        }
        .storage-refresh {
            height: 40px;
            border-radius: 12px;
            border: 1px solid rgba(125, 211, 252, 0.25);
            background: rgba(15, 23, 42, 0.6);
            color: #e2e8f0;
            padding: 0 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .storage-refresh:hover,
        .diff-toggle:hover {
            border-color: rgba(125, 211, 252, 0.52);
            background: rgba(14, 165, 233, 0.16);
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 22px;
        }
        .summary-card {
            background: rgba(15, 23, 42, 0.72);
            border: 1px solid rgba(148, 163, 184, 0.16);
            border-radius: 18px;
            padding: 18px 20px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
        }
        .summary-label {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .summary-value {
            font-size: 28px;
            font-weight: 800;
            color: #f8fafc;
        }
        .summary-value.ok { color: #4ade80; }
        .summary-value.warn { color: #fbbf24; }
        .summary-value.info { color: #7dd3fc; }
        .status-meta {
            margin-bottom: 18px;
            color: #94a3b8;
            font-size: 12px;
        }
        .table-list {
            display: grid;
            gap: 14px;
        }
        .table-card {
            background: rgba(15, 23, 42, 0.74);
            border: 1px solid rgba(148, 163, 184, 0.14);
            border-radius: 18px;
            padding: 18px 20px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
        }
        .table-head {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 14px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .table-name {
            font-size: 20px;
            font-weight: 700;
            color: #f8fafc;
            margin: 0 0 6px;
        }
        .table-scope {
            color: #94a3b8;
            font-size: 12px;
        }
        .badge-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.2px;
            border: 1px solid transparent;
        }
        .badge.ok {
            color: #86efac;
            background: rgba(34, 197, 94, 0.14);
            border-color: rgba(34, 197, 94, 0.24);
        }
        .badge.info {
            color: #93c5fd;
            background: rgba(59, 130, 246, 0.14);
            border-color: rgba(59, 130, 246, 0.26);
        }
        .badge.warn {
            color: #fde68a;
            background: rgba(245, 158, 11, 0.14);
            border-color: rgba(245, 158, 11, 0.26);
        }
        .order-note {
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid rgba(125, 211, 252, 0.18);
            background: rgba(14, 165, 233, 0.08);
            color: #bae6fd;
            font-size: 12px;
            line-height: 1.6;
        }
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }
        .metric-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 14px;
            padding: 12px 14px;
        }
        .metric-label {
            color: #94a3b8;
            font-size: 11px;
            margin-bottom: 7px;
        }
        .metric-value {
            color: #f8fafc;
            font-size: 18px;
            font-weight: 800;
        }
        .diff-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 14px;
        }
        .diff-toggle {
            border: 1px solid rgba(251, 191, 36, 0.32);
            background: rgba(245, 158, 11, 0.12);
            color: #fde68a;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
        }
        .diff-panel {
            display: none;
            margin-top: 14px;
            border: 1px solid rgba(251, 191, 36, 0.2);
            background: rgba(15, 23, 42, 0.86);
            border-radius: 16px;
            overflow: hidden;
        }
        .diff-panel.open {
            display: block;
        }
        .diff-summary {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0;
            border-bottom: 1px solid rgba(148, 163, 184, 0.14);
        }
        .diff-summary-item {
            padding: 12px 14px;
            border-right: 1px solid rgba(148, 163, 184, 0.12);
        }
        .diff-summary-item:last-child {
            border-right: 0;
        }
        .diff-summary-label {
            color: #94a3b8;
            font-size: 11px;
            margin-bottom: 6px;
        }
        .diff-summary-value {
            color: #f8fafc;
            font-size: 13px;
            font-weight: 800;
            word-break: break-word;
        }
        .diff-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }
        .diff-column {
            min-width: 0;
            border-right: 1px solid rgba(148, 163, 184, 0.12);
        }
        .diff-column:last-child {
            border-right: 0;
        }
        .diff-column-head {
            padding: 10px 14px;
            color: #bae6fd;
            font-size: 12px;
            font-weight: 800;
            background: rgba(14, 165, 233, 0.08);
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
        }
        .diff-code {
            margin: 0;
            padding: 14px;
            max-height: 260px;
            overflow: auto;
            color: #dbeafe;
            font-size: 11px;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        }
        .storage-empty {
            padding: 28px;
            text-align: center;
            color: #94a3b8;
            border-radius: 18px;
            border: 1px dashed rgba(148, 163, 184, 0.22);
        }
        @media (max-width: 880px) {
            .summary-grid, .metric-grid, .diff-summary {
                grid-template-columns: 1fr 1fr;
            }
            .diff-grid {
                grid-template-columns: 1fr;
            }
            .diff-column {
                border-right: 0;
                border-bottom: 1px solid rgba(148, 163, 184, 0.12);
            }
        }
        @media (max-width: 560px) {
            .summary-grid, .metric-grid, .diff-summary {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="storage-wrap">
        <div class="storage-hero">
            <div>
                <h1 class="storage-title">存储迁移状态台</h1>
                <p class="storage-subtitle">集中查看已迁表的真实读源、一致性校验、JSON/SQLite 数量，以及当前双写状态，便于后续从双写过渡到 SQLite 主读。</p>
            </div>
            <button class="storage-refresh" id="refreshStorageStatus">刷新状态</button>
        </div>

        <div class="summary-grid" id="storageSummary">
            <div class="summary-card"><div class="summary-label">总表数</div><div class="summary-value info">-</div></div>
            <div class="summary-card"><div class="summary-label">一致表数</div><div class="summary-value ok">-</div></div>
            <div class="summary-card"><div class="summary-label">异常表数</div><div class="summary-value warn">-</div></div>
            <div class="summary-card"><div class="summary-label">当前检查时间</div><div class="summary-value" style="font-size:16px;">-</div></div>
        </div>

        <div class="status-meta" id="storageStatusMeta">正在加载存储迁移状态...</div>
        <div class="table-list" id="storageTableList">
            <div class="storage-empty">正在加载...</div>
        </div>
    </div>

    <script src="/js/shared/api.js?v=20260530-01"></script>
    <script src="/js/shared/navbar.js?v=20260530-08"></script>
    <script>
        function sourceLabel(source) {
            if (source === 'sqlite') return 'SQLite';
            if (source === 'json') return 'JSON';
            return source || '-';
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function renderDiffPanel(item, index) {
            if (item.parity !== 'mismatch' || !item.diff) return '';
            const diff = item.diff || {};
            const semantic = diff.semantic || {};
            return `
                <div class="diff-actions">
                    <button class="diff-toggle" type="button" data-diff-toggle="${index}">查看差异详情</button>
                </div>
                <div class="diff-panel" id="storageDiffPanel${index}">
                    <div class="diff-summary">
                        <div class="diff-summary-item">
                            <div class="diff-summary-label">差异路径</div>
                            <div class="diff-summary-value">${escapeHtml(semantic.path || '-')}</div>
                        </div>
                        <div class="diff-summary-item">
                            <div class="diff-summary-label">差异原因</div>
                            <div class="diff-summary-value">${escapeHtml(semantic.reason || '文本内容不一致')}</div>
                        </div>
                        <div class="diff-summary-item">
                            <div class="diff-summary-label">文本差异位置</div>
                            <div class="diff-summary-value">${diff.firstDiffIndex ?? '-'}</div>
                        </div>
                        <div class="diff-summary-item">
                            <div class="diff-summary-label">JSON / SQLite 长度</div>
                            <div class="diff-summary-value">${diff.jsonLength ?? '-'} / ${diff.sqliteLength ?? '-'}</div>
                        </div>
                    </div>
                    <div class="diff-grid">
                        <div class="diff-column">
                            <div class="diff-column-head">JSON 侧预览</div>
                            <pre class="diff-code">${escapeHtml(semantic.jsonPreview || diff.jsonExcerpt || '-')}</pre>
                        </div>
                        <div class="diff-column">
                            <div class="diff-column-head">SQLite 侧预览</div>
                            <pre class="diff-code">${escapeHtml(semantic.sqlitePreview || diff.sqliteExcerpt || '-')}</pre>
                        </div>
                    </div>
                    <div class="diff-grid">
                        <div class="diff-column">
                            <div class="diff-column-head">JSON 文本差异片段</div>
                            <pre class="diff-code">${escapeHtml(diff.jsonExcerpt || '-')}</pre>
                        </div>
                        <div class="diff-column">
                            <div class="diff-column-head">SQLite 文本差异片段</div>
                            <pre class="diff-code">${escapeHtml(diff.sqliteExcerpt || '-')}</pre>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderOrderNote(item) {
            if (!item.orderDiff) return '';
            const order = item.orderDiff;
            return `
                <div class="order-note">
                    顺序提示：${escapeHtml(order.message || 'JSON 与 SQLite 列表顺序不同。')}
                    第一处顺序差异在第 ${Number(order.firstIndex ?? 0) + 1} 条：
                    JSON 为「${escapeHtml(order.jsonKey || '-')}」，SQLite 为「${escapeHtml(order.sqliteKey || '-')}」。
                </div>
            `;
        }

        function renderSummary(data) {
            const summary = data.summary || {};
            const checkedAt = data.checkedAt ? new Date(data.checkedAt).toLocaleString('zh-CN', { hour12: false }) : '-';
            document.getElementById('storageSummary').innerHTML = `
                <div class="summary-card"><div class="summary-label">总表数</div><div class="summary-value info">${summary.totalTables ?? '-'}</div></div>
                <div class="summary-card"><div class="summary-label">一致表数</div><div class="summary-value ok">${summary.matchedTables ?? '-'}</div></div>
                <div class="summary-card"><div class="summary-label">异常表数</div><div class="summary-value warn">${summary.mismatchedTables ?? '-'}</div></div>
                <div class="summary-card"><div class="summary-label">当前检查时间</div><div class="summary-value" style="font-size:16px;">${checkedAt}</div></div>
            `;
            document.getElementById('storageStatusMeta').textContent = '已迁表默认采用 JSON + SQLite 双写；auto 模式优先 JSON，JSON 为空时回退 SQLite。';
        }

        function renderTableList(data) {
            const tables = Array.isArray(data.tables) ? data.tables : [];
            const list = document.getElementById('storageTableList');
            if (!tables.length) {
                list.innerHTML = '<div class="storage-empty">暂无迁移状态数据。</div>';
                return;
            }

            list.innerHTML = tables.map((item, index) => `
                <section class="table-card">
                    <div class="table-head">
                        <div>
                            <h2 class="table-name">${item.label}</h2>
                            <div class="table-scope">作用域: ${item.scope} · 表键: ${item.key}</div>
                        </div>
                        <div class="badge-row">
                            <span class="badge ${item.parity === 'match' ? 'ok' : 'warn'}">一致性: ${item.parity === 'match' ? 'MATCH' : 'MISMATCH'}</span>
                            ${item.orderDiff ? '<span class="badge warn">顺序: 不一致</span>' : ''}
                            <span class="badge info">Auto读源: ${sourceLabel(item.autoSource)}</span>
                            <span class="badge info">写策略: ${item.writeStrategy}</span>
                        </div>
                    </div>
                    <div class="metric-grid">
                        <div class="metric-box">
                            <div class="metric-label">JSON 数量</div>
                            <div class="metric-value">${item.jsonCount ?? '-'}</div>
                        </div>
                        <div class="metric-box">
                            <div class="metric-label">SQLite 数量</div>
                            <div class="metric-value">${item.sqliteCount ?? '-'}</div>
                        </div>
                        <div class="metric-box">
                            <div class="metric-label">读源结果</div>
                            <div class="metric-value">${sourceLabel(item.autoSource)}</div>
                        </div>
                        <div class="metric-box">
                            <div class="metric-label">状态</div>
                            <div class="metric-value">${item.parity === 'match' ? '已对齐' : '待排查'}</div>
                        </div>
                    </div>
                    ${renderOrderNote(item)}
                    ${renderDiffPanel(item, index)}
                </section>
            `).join('');

            list.querySelectorAll('[data-diff-toggle]').forEach(button => {
                button.addEventListener('click', () => {
                    const idx = button.getAttribute('data-diff-toggle');
                    const panel = document.getElementById(`storageDiffPanel${idx}`);
                    const isOpen = panel.classList.toggle('open');
                    button.textContent = isOpen ? '收起差异详情' : '查看差异详情';
                });
            });
        }

        async function loadStorageStatus() {
            const list = document.getElementById('storageTableList');
            const meta = document.getElementById('storageStatusMeta');
            list.innerHTML = '<div class="storage-empty">正在重新校验迁移状态...</div>';
            meta.textContent = '正在读取服务端迁移状态...';
            try {
                const data = await API.get('/api/storage/status');
                renderSummary(data);
                renderTableList(data);
            } catch (err) {
                meta.textContent = '读取失败';
                list.innerHTML = `<div class="storage-empty">加载失败: ${err.message}</div>`;
            }
        }

        document.getElementById('refreshStorageStatus').addEventListener('click', loadStorageStatus);
        loadStorageStatus();
    </script>
</body>
</html>
