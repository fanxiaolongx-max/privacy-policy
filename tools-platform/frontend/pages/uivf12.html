<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UIVF12 抓取引擎 v6.6 - Tools Platform</title>
    <meta name="description" content="UI.Vision 全能抓取引擎，自动化脚本工程中心，脚本云端仓库管理">
    <link rel="stylesheet" href="/css/shared.css?v=20260702-01">
    <link rel="stylesheet" href="/css/uivf12.css?v=20260628-19">
    <style>
        .repo-source-panel {
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .repo-source-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }
        .repo-source-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.2px;
            background: rgba(59,130,246,0.14);
            border: 1px solid rgba(59,130,246,0.3);
            color: #93c5fd;
        }
        .repo-source-note {
            font-size: 11px;
            color: #94a3b8;
            line-height: 1.4;
        }
        .repo-source-select {
            height: 30px;
            border-radius: 8px;
            border: 1px solid rgba(59,130,246,0.28);
            background: rgba(15,23,42,0.65);
            color: #e2e8f0;
            font-size: 12px;
            padding: 0 10px;
            outline: none;
        }
        .repo-source-select option {
            color: #0f172a;
        }
    </style>
</head>

<body id="uiv-page">
    <div class="page-content">
        <div class="uiv-title">
            <span>🚀 自动化脚本工程中心 <span
                    id="uivFrontendVersion"
                    style="font-size:14px;color:#94a3b8;font-weight:normal;margin-left:8px;">v加载中</span></span>
            <span class="tag">多源融合 + Formula 权威版</span>
        </div>

        <div class="uiv-container">
            <!-- ── 左侧脚本仓库侧边栏 ── -->
            <div class="sidebar">
                <h2>
                    📂 智能调度仓库
                    <button class="cat-copy-btn" onclick="UIVCopy.copyAllConsoleScripts()"
                        title="拷贝仓库内所有分类的全部脚本">全量打包</button>
                </h2>
                <div style="font-size:11px; color:#888; margin-bottom:10px; line-height:1.4;">
                    默认清爽折叠，<b>双击回填至工作台</b>。
                </div>
                <div class="repo-source-controls">
                    <span class="repo-source-note">仓库读源模式:</span>
                    <select id="repoSourceMode" class="repo-source-select">
                        <option value="auto">自动模式</option>
                        <option value="sqlite">强制 SQLite</option>
                    </select>
                </div>
                <div id="repoSourcePanel" class="repo-source-panel">
                    <span class="repo-source-badge">脚本来源: -</span>
                    <span class="repo-source-badge">分类来源: -</span>
                    <span class="repo-source-note">仓库加载后会在这里显示当前真实读源。</span>
                </div>
                <button class="btn-script-analysis" onclick="UIVScriptAnalysis.open()">脚本分析</button>

                <div id="scriptList" style="flex:1; overflow-y:auto; padding-right:5px; padding-bottom:20px;"></div>

                <div style="margin-top:auto; padding-top:10px; border-top:1px dashed var(--border);">
                    <button class="btn-add-cat" onclick="UIVSidebar.createNewCategory()">[+] 新建自定义分类</button>
                    <button class="btn-batch-pkg" onclick="UIVCopy.copyAllConsoleScripts()">📦 拷贝全部为批量阵列 (F12)</button>
                    <button class="btn-batch-pkg btn-batch-uiv" onclick="UIVCopy.copyAllUivScripts()">📦 拷贝全部为批量阵列 (UI.V)</button>
                    <div class="btn-batch-run-row">
                        <button class="btn-batch-pkg btn-batch-uiv-run" onclick="UIVCopy.runAllUivScriptsDirect()">🚀 运行批脚本</button>
                        <button class="btn-batch-speed" onclick="UIVCopy.cycleUivBatchSpeed()" title="">1x</button>
                    </div>
                    <button class="btn-batch-pkg btn-batch-uiv-run btn-batch-uiv-test" onclick="UIVCopy.runTestUivScriptsDirect()">🚀 运行测试批脚本</button>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-io" onclick="UIVSidebar.exportBackup()">📤 导出备份</button>
                        <label class="btn-io" style="cursor:pointer;">
                            📥 导入配置
                            <input type="file" id="importFile" style="display:none" accept=".json"
                                onchange="UIVSidebar.importBackup(event)">
                        </label>
                    </div>
                </div>
            </div>

            <!-- ── 中间：输入与解析区 ── -->
            <div class="left-panel">
                <label class="panel-label">1. 请求 URL 目标地址:</label>
                <div class="input-row">
                    <select id="urlPreset" style="width:35%;"
                        onchange="document.getElementById('requestUrl').value = this.value">
                        <option value="https://datafab-pro.gtsdata.huawei.com/DataFabKernelCn/v1/answer/getAnswers">🟢
                            DataFab - 明细列表</option>
                        <option value="https://netcare.huawei.com/adc-service/web/rest/v1/services/xxx">🔴 NetCare -
                            中国节点</option>
                        <option value="https://netcare-ae.gts.huawei.com/adc-service/web/rest/v1/services/xxx">🔵
                            NetCare - 中东节点</option>
                        <option value="https://netcare-de.gts.huawei.com/adc-service/web/rest/v1/services/xxx">🟠
                            NetCare - 德国节点</option>
                        <option value="">⚙️ 自定义新地址...</option>
                    </select>
                    <input type="text" id="requestUrl"
                        value="https://datafab-pro.gtsdata.huawei.com/DataFabKernelCn/v1/answer/getAnswers">
                </div>

                <label class="panel-label" style="display:flex; justify-content:space-between; align-items:center;">
                    2. 请求负载 Payload (JSON):
                    <span style="font-size:12px; color:#888; font-weight:normal;">粘贴后可点击格式化</span>
                </label>
                <textarea id="jsonInput" placeholder='{"srcTenantId":"...", "answerParamList": [...]}'></textarea>
                <div id="payloadViewer"></div>

                <div class="input-row" style="margin-bottom:0; flex-shrink:0;">
                    <input type="text" id="fileName" value="PBI_自动抓取" placeholder="文件名前缀 (例如：PBI_代表处数据)">
                </div>

                <div class="controls">
                    <label><input type="checkbox" id="useGlobalVars" checked> 全局变量注入</label>
                    <label><input type="checkbox" id="isPagination" checked> 循环翻页</label>
                    <label><input type="checkbox" id="forceSumData" checked> 强制获取汇总数据-兜底</label>
                    <label style="color:var(--warning);"><input type="checkbox" id="autoFetchCPC" checked> 动态抓取 CPC /
                        NID</label>
                    <label style="color:var(--cyber); font-weight:bold;"><input type="checkbox" id="autoRuntimeMonth"
                            checked> 开启[运行时:当月+上月]动态双重裂变</label>
                    <label style="color:var(--blue); font-weight:bold;"><input type="checkbox"
                            id="autoNetCareTriplicate" checked> 🌍 保存侧边栏时自动生成 NetCare 三大区脚本阵列</label>
                </div>

                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="UIVWorkbench.formatAndAnalyzeJSON()">🔍 格式化</button>
                    <button class="btn btn-danger" onclick="UIVWorkbench.clearAll()">🗑️ 清空</button>
                    <button class="btn btn-primary" onclick="UIVGenerator.generateScript()">⚡ 一键生成生产级脚本</button>
                </div>
                <div id="errorMsg" class="error-msg"></div>
            </div>

            <!-- ── 右侧：双端输出区 ── -->
            <div class="right-panel">
                <div class="output-header">
                    <label class="output-label">🤖 生产级 UI.Vision 宏代码:</label>
                    <div class="btn-group" style="gap:8px; margin:0; flex:none;">
                        <button id="saveBtn" class="btn btn-secondary btn-action" style="white-space:nowrap;"
                            onclick="UIVSave.saveCurrentScript()">💾 加入侧边栏</button>
                        <button id="btnCopyUIV" class="btn btn-action"
                            style="background:var(--accent); white-space:nowrap;"
                            onclick="UIVCopy.copyCodeText('codeOutput', 'btnCopyUIV', 'UIV')">📋 复制 UIV</button>
                    </div>
                </div>
                <textarea id="codeOutput" readonly placeholder="生成后显示 UI.Vision 宏代码..."
                    style="flex:1; margin-bottom:14px;"></textarea>

                <div class="output-header">
                    <label class="output-label console-label">💻 纯浏览器控制台执行脚本 (F12):</label>
                    <button id="btnCopyConsole" class="btn btn-action"
                        style="background:var(--console); margin:0; white-space:nowrap;"
                        onclick="UIVCopy.copyCodeText('consoleOutput', 'btnCopyConsole', 'Console')">📋 复制
                        Console</button>
                </div>
                <textarea id="consoleOutput" readonly placeholder="生成后显示纯浏览器 F12 直跑脚本..." style="flex:1;"></textarea>
            </div>
        </div>

        <!-- ── 生成日志面板 ── -->
        <div id="genLogPanel" class="gen-log-panel">
            <div class="gen-log-header" onclick="UIVGenLog.toggle()">
                <span class="gen-log-title">
                    <span id="genLogIcon">▶</span>
                    📋 生成日志
                    <span id="genLogBadge" class="gen-log-badge" style="display:none;">0</span>
                </span>
                <div style="display:flex; align-items:center; gap:10px;">
                    <span id="genLogStatus" class="gen-log-status"></span>
                    <button class="gen-log-clear" onclick="event.stopPropagation(); UIVGenLog.clear()">清空</button>
                </div>
            </div>
            <div id="genLogBody" class="gen-log-body" style="display:none;">
                <div id="genLogContent" class="gen-log-content">
                    <span style="color:#555; font-size:12px;">等待生成...</span>
                </div>
            </div>
        </div>
    </div>

    <div id="scriptAnalysisModal" class="script-analysis-overlay" aria-hidden="true">
        <div class="script-analysis-modal" role="dialog" aria-modal="true" aria-labelledby="scriptAnalysisTitle">
            <div class="script-analysis-header">
                <div>
                    <h3 id="scriptAnalysisTitle">脚本仓库分析</h3>
                    <p id="scriptAnalysisSummary">正在读取脚本仓库...</p>
                </div>
                <button class="script-analysis-close" onclick="UIVScriptAnalysis.close()" aria-label="关闭">×</button>
            </div>
            <div class="script-analysis-toolbar">
                <input id="scriptAnalysisSearch" type="text" placeholder="搜索分类、脚本、URL、字段..." oninput="UIVScriptAnalysis.render()">
                <select id="scriptAnalysisCategory" onchange="UIVScriptAnalysis.render()">
                    <option value="">全部分类</option>
                </select>
                <button class="script-analysis-save" onclick="UIVScriptAnalysis.saveChanges()">保存修改</button>
                <button class="script-analysis-refresh" onclick="UIVScriptAnalysis.reload()">刷新</button>
            </div>
            <div class="script-analysis-table-wrap">
                <table class="script-analysis-table">
                    <thead>
                        <tr>
                            <th>分类</th>
                            <th>脚本名称</th>
                            <th>生成表名称</th>
                            <th>请求 URL</th>
                            <th>更新时间</th>
                            <th>平台</th>
                            <th>请求</th>
                            <th>核心对象</th>
                            <th>筛选字段</th>
                            <th>运行开关</th>
                            <th>响应取表</th>
                            <th>回填状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="scriptAnalysisRows">
                        <tr><td colspan="12" class="script-analysis-empty">等待分析...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="script-analysis-footer">
                <span>双击行可回填；点击筛选字段可改值，点击 × 可删除字段；保存前关闭窗口会提示先保存。</span>
            </div>
        </div>
    </div>

    <div id="scriptAnalysisMiniDialog" class="script-analysis-mini-overlay" aria-hidden="true">
        <div class="script-analysis-mini-dialog" role="dialog" aria-modal="true" aria-labelledby="scriptAnalysisMiniTitle">
            <div class="script-analysis-mini-header">
                <h4 id="scriptAnalysisMiniTitle">确认操作</h4>
                <button class="script-analysis-mini-close" onclick="UIVScriptAnalysis.cancelDialog()" aria-label="关闭">×</button>
            </div>
            <div class="script-analysis-mini-body">
                <p id="scriptAnalysisMiniMessage"></p>
                <textarea id="scriptAnalysisMiniInput" placeholder="输入字段值"></textarea>
                <div id="scriptAnalysisMultiEditor" class="script-analysis-multi-editor"></div>
                <button id="scriptAnalysisMultiAdd" class="script-analysis-multi-add" onclick="UIVScriptAnalysis.addMultiValue()" type="button">+ 添加一项</button>
                <div id="scriptAnalysisSaveAsFields" class="script-analysis-saveas-fields">
                    <label>
                        新脚本名称
                        <input id="scriptAnalysisSaveAsName" type="text" placeholder="请输入新脚本名称">
                    </label>
                    <label>
                        保存分类
                        <select id="scriptAnalysisSaveAsCategory"></select>
                    </label>
                </div>
            </div>
            <div class="script-analysis-mini-footer">
                <button class="script-analysis-mini-btn secondary" onclick="UIVScriptAnalysis.cancelDialog()">取消</button>
                <button id="scriptAnalysisMiniConfirm" class="script-analysis-mini-btn primary" onclick="UIVScriptAnalysis.confirmDialog()">确认</button>
            </div>
        </div>
    </div>

    <!-- 共享脚本 -->
    <script src="/js/shared/api.js?v=20260628-19"></script>
    <script src="/js/shared/toast.js?v=20260628-19"></script>
    <script src="/js/shared/i18n.js?v=20260628-19"></script>
    <script src="/js/shared/navbar.js?v=20260702-02"></script>
    <!-- UIVF12 模块 -->
    <script src="/js/uivf12/i18n.js?v=20260628-19"></script>
    <script src="/js/uivf12/workbench.js?v=20260628-19"></script>
    <script src="/js/uivf12/copy.js?v=20260628-27"></script>
    <script src="/js/uivf12/genlog.js?v=20260628-19"></script>
    <script src="/js/uivf12/generator.js?v=20260628-19"></script>
    <script src="/js/uivf12/save.js?v=20260628-19"></script>
    <script src="/js/uivf12/sidebar.js?v=20260628-19"></script>
    <script src="/js/uivf12/analysis.js?v=20260628-19"></script>
    <script>
        function renderUIVFrontendVersion() {
            const versionEl = document.getElementById('uivFrontendVersion');
            if (!versionEl) return;
            const resourceNodes = [
                ...document.querySelectorAll('link[href*="/css/uivf12.css"]'),
                ...document.querySelectorAll('script[src*="/js/uivf12/"]')
            ];
            const versions = resourceNodes
                .map(node => node.getAttribute('href') || node.getAttribute('src') || '')
                .map(url => {
                    try {
                        return new URL(url, window.location.origin).searchParams.get('v') || '';
                    } catch (e) {
                        const match = url.match(/[?&]v=([^&]+)/);
                        return match ? match[1] : '';
                    }
                })
                .filter(Boolean)
                .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
            versionEl.textContent = versions.length ? `v${versions[versions.length - 1]}` : UIVT('uiv.version.unmarked');
            versionEl.title = versions.length ? UIVT('uiv.version.title', { version: versions[versions.length - 1] }) : UIVT('uiv.version.missing');
        }

        // 页面初始化
        document.addEventListener('DOMContentLoaded', () => {
            if (window.UIVI18n) window.UIVI18n.applyPage();
            renderUIVFrontendVersion();
            const modeSelect = document.getElementById('repoSourceMode');
            if (modeSelect) {
                modeSelect.value = API.getSourceMode('uiv_repository');
                modeSelect.addEventListener('change', () => {
                    API.setSourceMode('uiv_repository', modeSelect.value);
                    UIVSidebar.loadSavedScripts();
                });
            }
            UIVSidebar.loadSavedScripts();
        });
    </script>
</body>

</html>
