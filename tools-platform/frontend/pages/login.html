        function openLegalModal(type) {
            const item = LEGAL_CONTENT[type] || LEGAL_CONTENT.privacy;
            const modal = document.getElementById('legalModal');
            const title = document.getElementById('legalModalTitle');
            const body = document.getElementById('legalModalBody');
            if (!modal || !title || !body) return;
            title.textContent = item.title;
            body.innerHTML = item.html;
            body.scrollTop = 0;
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
        }

        function closeLegalModal() {
            const modal = document.getElementById('legalModal');
            if (!modal) return;
            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
        }

        function handleLegalBackdrop(event) {
            if (event.target && event.target.id === 'legalModal') closeLegalModal();
        }

        document.addEventListener('keydown', event => {
            if (event.key === 'Escape') closeLegalModal();
        });

        class Star {
            constructor() {
                this.reset(true);
            }
            reset(randomZ = false) {
                this.x = (Math.random() - 0.5) * width * 2;
                this.y = (Math.random() - 0.5) * height * 2;
                this.z = randomZ ? Math.random() * width + 100 : width + 100;
                this.pz = this.z;
            }
            update() {
                this.pz = this.z;
                this.z -= currentSpeed;
                if (this.z < 1) {
                    this.reset(false);
                    this.pz = this.z;
                }
            }
            draw() {
                const sx = (this.x / this.z) * fov + width / 2;
                const sy = (this.y / this.z) * fov + height / 2;
                const px = (this.x / this.pz) * fov + width / 2;
                const py = (this.y / this.pz) * fov + height / 2;

                const distanceRatio = 1 - (this.z / width);
                const opacity = Math.max(0.1, distanceRatio);
                const lineWidth = Math.max(0.5, distanceRatio * (currentSpeed > 10 ? 4 : 2));

                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(sx, sy);
                ctx.strokeStyle = `rgba(165, 180, 252, ${opacity})`;
                ctx.lineWidth = lineWidth;
                ctx.stroke();
            }
        }

        for (let i = 0; i < numStars; i++) {
            stars.push(new Star());
        }

        function animate() {
            currentSpeed += (targetSpeed - currentSpeed) * 0.05;
            ctx.fillStyle = 'rgba(5, 8, 16, 0.4)';
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                star.update();
                star.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();

        // --- 业务逻辑 ---
        async function loadAppVersion() {
            const badge = document.getElementById('appVersionBadge');
            if (!badge) return;
            try {
                const res = await fetch('/api/app-version', { cache: 'no-store' });
                if (!res.ok) throw new Error('version api failed');
                const data = await res.json();
                if (data && data.version) {
                    badge.textContent = `v${String(data.version).replace(/^v/i, '')}`;
                }
            } catch (e) {
                console.warn('[Login] load app version failed:', e);
            }
        }

        loadAppVersion();

        function toggleGame(show) {
            const wrapper = document.getElementById('gameWrapper');
            const iframe = document.getElementById('gameIframe');
            if (show) {
                wrapper.classList.add('active');
                // 每次打开都重新加载游戏
                iframe.setAttribute('src', '/knight-dreams/index.html');
            } else {
                wrapper.classList.remove('active');
                // 退出时清空 iframe 地址，彻底销毁游戏进程和声音
                iframe.setAttribute('src', '');
            }
        }

        function handleEnter(e) {
            if (e.key === 'Enter') doLogin();
        }

            const p = document.getElementById('password').value;
            const errDiv = document.getElementById('error-msg');
            const btn = document.getElementById('loginBtn');
            const panel = document.getElementById('loginPanel');

            if (!u || !p) {
                errDiv.textContent = '用户名和密码不能为空';
                return;
            }

            errDiv.textContent = '';

            // 触发跃迁动画
            const originalText = btn.innerHTML;
            btn.innerHTML = '正在登录 <span class="loader"></span>';
            btn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
            btn.style.boxShadow = '0 10px 25px -5px rgba(16, 185, 129, 0.5)';
            panel.style.transform = 'scale(0.95)';
            targetSpeed = warpSpeed;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || '登录失败');
                }

                localStorage.setItem('tools_token', data.token);
                localStorage.setItem('tools_user', data.username);
                localStorage.setItem('tools_role', data.role);

                // 稍微等待动画展示一下爽感
                setTimeout(() => {
                    window.location.href = '/';
                }, 800);

            } catch (e) {
                // 恢复原状
                setTimeout(() => {
                    targetSpeed = baseSpeed;
                    btn.innerHTML = '登 录';
                    btn.style.background = '';
                    btn.style.boxShadow = '';
                    panel.style.transform = 'scale(1)';
                    errDiv.textContent = e.message;
                }, 500);
            }
        }
    </script>
</body>

</html>
