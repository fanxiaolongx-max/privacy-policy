<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自定义工具 - Tools Platform</title>
    <link rel="stylesheet" href="/css/shared.css?v=20260713-02">
    <style>
        body {
            margin: 0;
            background: #eef3f8;
            min-height: 100vh;
            overflow: hidden;
        }
        .custom-tool-shell {
            padding-top: var(--navbar-h);
            height: 100vh;
            box-sizing: border-box;
            display: grid;
            grid-template-rows: auto 1fr;
        }
        .custom-tool-head {
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 0 18px;
            background: #f8fafc;
            border-bottom: 1px solid #dbe5ef;
            box-sizing: border-box;
        }
        .custom-tool-title {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #172033;
            font-size: 14px;
            font-weight: 800;
        }
        .custom-tool-title span:last-child {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .custom-tool-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .tool-action {
            height: 30px;
            padding: 0 11px;
            border-radius: 7px;
            border: 1px solid #c9d6e4;
            color: #33506f;
            background: #fff;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .tool-action:hover {
            border-color: #4f8fd9;
            color: #1762ae;
            background: #f7fbff;
        }
        .custom-tool-frame {
            width: 100%;
            height: 100%;
            border: 0;
            background: #fff;
        }
        .custom-tool-empty {
            display: grid;
            place-items: center;
            height: 100%;
            color: #637083;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="custom-tool-shell">
        <div class="custom-tool-head">
            <div class="custom-tool-title">
                <span id="toolIcon">🧩</span>
                <span id="toolName">自定义工具</span>
            </div>
            <div class="custom-tool-actions">
                <a class="tool-action" id="openRawTool" href="#" target="_blank" rel="noopener">新窗口打开</a>
                <button class="tool-action" onclick="location.reload()">刷新</button>
            </div>
        </div>
        <div id="toolFrameHost" class="custom-tool-empty">正在加载自定义工具...</div>
    </div>

    <script src="/js/shared/api.js?v=20260710-01"></script>
    <script src="/js/shared/toast.js?v=20260530-03"></script>
    <script src="/js/shared/navbar.js?v=20260713-03"></script>
    <script>
        function getToolSlug() {
            const parts = window.location.pathname.split('/').filter(Boolean);
            return parts[0] === 'tools' ? parts[1] : '';
        }

        async function loadCustomTool() {
            const slug = getToolSlug();
            const host = document.getElementById('toolFrameHost');
            try {
                const tools = await API.get('/api/custom-tools');
                const tool = (tools || []).find(item => item.slug === slug);
                if (!tool) {
                    host.textContent = '未找到该自定义工具。';
                    return;
                }
                document.title = `${tool.name} - Tools Platform`;
                document.getElementById('toolIcon').textContent = tool.icon || '🧩';
                document.getElementById('toolName').textContent = tool.name || '自定义工具';
                document.getElementById('openRawTool').href = tool.filePath;
                host.className = '';
                host.innerHTML = `<iframe class="custom-tool-frame" src="${tool.filePath}" title="${tool.name || 'Custom Tool'}" allow="autoplay; fullscreen; microphone; display-capture"></iframe>`;
            } catch (err) {
                host.textContent = `加载自定义工具失败：${err.message}`;
            }
        }

        document.addEventListener('DOMContentLoaded', loadCustomTool);
    </script>
</body>
</html>
