<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f7fb" />
  <title>人数计数器</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: rgba(255,255,255,.88);
      --text: #172033;
      --muted: #7a8496;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #ef4444;
      --border: rgba(23,32,51,.08);
      --shadow: 0 18px 45px rgba(28, 43, 73, .12);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, #dbeafe 0, transparent 34%),
        radial-gradient(circle at bottom right, #ede9fe 0, transparent 32%),
        var(--bg);
      color: var(--text);
      overscroll-behavior: none;
    }

    body {
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      padding: max(18px, env(safe-area-inset-top))
               16px
               max(18px, env(safe-area-inset-bottom));
    }

    .app {
      width: min(100%, 460px);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .header {
      padding: 8px 4px 2px;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -.5px;
    }

    .header p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,.75);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .counter-card {
      min-height: 390px;
      padding: 28px 22px 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
    }

    .label {
      color: var(--muted);
      font-size: 15px;
    }

    .count {
      margin: 10px 0 8px;
      font-size: clamp(88px, 28vw, 150px);
      line-height: .95;
      font-weight: 800;
      letter-spacing: -6px;
      font-variant-numeric: tabular-nums;
      transition: transform .14s ease;
    }

    .count.bump { transform: scale(1.06); }

    .saved {
      color: var(--muted);
      font-size: 13px;
      min-height: 20px;
    }

    .main-btn {
      width: 100%;
      min-height: 112px;
      border: 0;
      border-radius: 28px;
      background: linear-gradient(145deg, var(--primary), var(--primary-dark));
      color: #fff;
      font-size: 27px;
      font-weight: 800;
      box-shadow: 0 14px 28px rgba(37,99,235,.28);
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
    }

    .main-btn:active {
      transform: scale(.985);
      box-shadow: 0 7px 18px rgba(37,99,235,.24);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .action-btn {
      min-height: 58px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255,255,255,.82);
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 7px 20px rgba(28,43,73,.06);
    }

    .action-btn:active { transform: scale(.97); }
    .action-btn.danger { color: var(--danger); }

    .info-card {
      padding: 16px 18px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 7px 0;
      font-size: 14px;
    }

    .info-row span:first-child { color: var(--muted); }
    .info-row strong {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .tip {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      padding: 0 14px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(24px, env(safe-area-inset-bottom));
      transform: translate(-50%, 20px);
      background: rgba(23,32,51,.92);
      color: #fff;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: .22s ease;
      z-index: 10;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-height: 700px) {
      .counter-card { min-height: 330px; padding-top: 20px; }
      .main-btn { min-height: 92px; }
      .count { font-size: clamp(76px, 24vw, 120px); }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>人数计数器</h1>
      <p>来一个人就按一下，数据会自动保存在当前手机里。</p>
    </header>

    <section class="card counter-card">
      <div>
        <div class="label">当前人数</div>
        <div class="count" id="count">0</div>
        <div class="saved" id="savedText">尚未开始计数</div>
      </div>

      <button class="main-btn" id="addBtn" type="button">+ 来了 1 人</button>
    </section>

    <section class="actions">
      <button class="action-btn" id="minusBtn" type="button">− 减 1</button>
      <button class="action-btn" id="undoBtn" type="button">↶ 撤销</button>
      <button class="action-btn danger" id="resetBtn" type="button">清零</button>
    </section>

    <section class="card info-card">
      <div class="info-row">
        <span>开始时间</span>
        <strong id="startTime">—</strong>
      </div>
      <div class="info-row">
        <span>最近操作</span>
        <strong id="lastAction">—</strong>
      </div>
    </section>

    <div class="tip">关闭网页或刷新都不会丢失。建议添加到手机桌面，使用起来更方便。</div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'mobile_people_counter_v1';

    const countEl = document.getElementById('count');
    const savedTextEl = document.getElementById('savedText');
    const startTimeEl = document.getElementById('startTime');
    const lastActionEl = document.getElementById('lastAction');
    const toastEl = document.getElementById('toast');

    let state = loadState();
    let toastTimer;

    function defaultState() {
      return {
        count: 0,
        startTime: null,
        updatedAt: null,
        lastAction: null,
        history: []
      };
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return saved && typeof saved.count === 'number'
          ? { ...defaultState(), ...saved }
          : defaultState();
      } catch {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      render();
    }

    function formatTime(timestamp) {
      if (!timestamp) return '—';
      return new Date(timestamp).toLocaleString('zh-CN', {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      toastEl.textContent = message;
      toastEl.classList.add('show');
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1400);
    }

    function vibrate(duration = 25) {
      if ('vibrate' in navigator) navigator.vibrate(duration);
    }

    function animateCount() {
      countEl.classList.remove('bump');
      void countEl.offsetWidth;
      countEl.classList.add('bump');
      setTimeout(() => countEl.classList.remove('bump'), 150);
    }

    function recordHistory(previousCount) {
      state.history.push({
        count: previousCount,
        time: Date.now()
      });
      if (state.history.length > 50) state.history.shift();
    }

    function updateCount(delta) {
      const previous = state.count;
      const next = Math.max(0, previous + delta);
      if (next === previous) {
        showToast('人数已经是 0');
        return;
      }

      recordHistory(previous);
      state.count = next;
      const now = Date.now();
      if (!state.startTime && next > 0) state.startTime = now;
      state.updatedAt = now;
      state.lastAction = delta > 0 ? '增加 1 人' : '减少 1 人';

      saveState();
      animateCount();
      vibrate();
    }

    function undo() {
      const last = state.history.pop();
      if (!last) {
        showToast('暂无可撤销操作');
        return;
      }

      state.count = last.count;
      state.updatedAt = Date.now();
      state.lastAction = '撤销上一步';
      if (state.count === 0) state.startTime = null;

      saveState();
      animateCount();
      vibrate(18);
      showToast('已撤销');
    }

    function reset() {
      if (state.count === 0) {
        showToast('当前已经是 0');
        return;
      }

      const ok = confirm(`确定清零吗？当前人数为 ${state.count}。`);
      if (!ok) return;

      state = defaultState();
      saveState();
      vibrate(35);
      showToast('已清零');
    }

    function render() {
      countEl.textContent = state.count;
      startTimeEl.textContent = formatTime(state.startTime);
      lastActionEl.textContent = state.lastAction || '—';

      if (state.updatedAt) {
        savedTextEl.textContent = `已自动保存 · ${formatTime(state.updatedAt)}`;
      } else {
        savedTextEl.textContent = '尚未开始计数';
      }
    }

    document.getElementById('addBtn').addEventListener('click', () => updateCount(1));
    document.getElementById('minusBtn').addEventListener('click', () => updateCount(-1));
    document.getElementById('undoBtn').addEventListener('click', undo);
    document.getElementById('resetBtn').addEventListener('click', reset);

    document.addEventListener('keydown', (event) => {
      if (event.code === 'Space' || event.code === 'Enter' || event.code === 'NumpadAdd') {
        event.preventDefault();
        updateCount(1);
      } else if (event.code === 'Backspace' || event.code === 'NumpadSubtract') {
        event.preventDefault();
        updateCount(-1);
      }
    });

    render();
  </script>
</body>
</html>
