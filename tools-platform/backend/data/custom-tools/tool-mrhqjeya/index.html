<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Horizon - 旗舰版行政日程指挥中心</title>
    <style>
        /* --- 顶奢智感科技多态色彩系统 --- */
        :root {
            --primary: #6366f1;         /* 极光靛蓝 */
            --primary-glow: rgba(99, 102, 241, 0.15);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.12);

            /* 闲忙度及状态色彩（亮色深沉色调） */
            --busy-free: #10b981;       /* 空闲绿 */
            --busy-light: #3b82f6;      /* 智慧蓝 */
            --busy-heavy: #f59e0b;      /* 警示橙 */
            --busy-critical: #ef4444;   /* 极度饱和红 */

            /* 亮色模式变量（默认） */
            --bg-base-gradient: radial-gradient(circle at 50% 0%, #f0f2fe 0%, #e2e8f0 70%);
            --bg-canvas: rgba(255, 255, 255, 0.75);
            --bg-sidebar: rgba(241, 245, 249, 0.5);
            --bg-timeline: rgba(248, 250, 252, 0.4);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: rgba(15, 23, 42, 0.08);
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-hover: rgba(255, 255, 255, 1);
            --modal-bg: #ffffff;
            --input-bg: #f1f5f9;
            --ctx-menu-bg: #ffffff;
            --ctx-item-hover: rgba(15, 23, 42, 0.05);
            --tag-urgent-bg: rgba(239, 68, 68, 0.12);
            --tag-urgent-text: #dc2626;
            --tag-work-bg: rgba(59, 130, 246, 0.12);
            --tag-work-text: #2563eb;
        }

        /* 暗黑模式变量 */
        [data-theme="dark"] {
            --bg-base-gradient: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #0f172a 70%);
            --bg-canvas: rgba(30, 41, 59, 0.7);
            --bg-sidebar: rgba(15, 23, 42, 0.4);
            --bg-timeline: rgba(10, 15, 30, 0.3);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.06);
            --card-bg: rgba(30, 41, 59, 0.5);
            --card-hover: rgba(30, 41, 59, 0.9);
            --modal-bg: #1e293b;
            --input-bg: rgba(0, 0, 0, 0.2);
            --ctx-menu-bg: #1e293b;
            --ctx-item-hover: rgba(255, 255, 255, 0.05);
            --tag-urgent-bg: rgba(239, 68, 68, 0.15);
            --tag-urgent-text: #fca5a5;
            --tag-work-bg: rgba(59, 130, 246, 0.15);
            --tag-work-text: #93c5fd;
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* --- 原生OS级别系统特性屏蔽（核心要求：禁止在页面选中文字复制粘贴，但表单输入框必须放行） --- */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display","Segoe UI", Roboto, sans-serif;
            user-select: text;
            -webkit-user-select: text;
        }
        button, .cell-unit, .schedule-meta-card, .view-switcher, .custom-context-menu {
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* 深度放行：允许模态框内的表单正常选中文本、打字与右键复制粘贴 */
        input, select, textarea, [contenteditable="true"] {
            user-select: text !important;
            -webkit-user-select: text !important;
        }

        body {
            background: var(--bg-base-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 30px;
            overflow: hidden;
        }

        /* --- 巨幕画布主体 --- */
        .dashboard-canvas {
            display: flex;
            background: var(--bg-canvas);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 1500px;
            height: 88vh;
            min-height: 750px;
            overflow: hidden;
            border: 1px solid var(--border);
            animation: canvasIntro 0.8s var(--ease-out-expo) forwards;
            position: relative;
            contain: layout style;
        }

        /* ================= 左栏：控制面板与三级日历 ================= */
        .sidebar {
            width: 480px;
            border-right: 1px solid var(--border);
            padding: 40px 32px;
            display: flex;
            flex-direction: column;
            background: var(--bg-sidebar);
            transition: width 0.4s var(--ease-out-expo), padding 0.4s var(--ease-out-expo);
        }
        .sidebar.collapsed { width: 0; padding: 40px 0 40px 32px; overflow: hidden; }
        .sidebar.collapsed .system-control-bar,
        .sidebar.collapsed .view-switcher,
        .sidebar.collapsed .cal-control-header,
        .sidebar.collapsed .calendar-render-engine,
        .sidebar.collapsed .conflict-btn-fixed { display: none; }

        /* 侧边折叠箭头 */
        .sidebar-collapse-btn { position: absolute; right: -16px; top: 50%; transform: translateY(-50%); width: 26px; height: 52px; background: var(--card-bg); border: 1px solid var(--border); border-left: none; border-radius: 0 14px 14px 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: var(--text-muted); transition: all 0.3s; z-index: 50; backdrop-filter: blur(4px); }
        .sidebar-collapse-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
        .sidebar-collapse-btn .arrow { transition: transform 0.3s; }
        .sidebar-collapse-btn:not(.expanded) .arrow { transform: rotate(180deg); }

        /* 系统状态级顶部多功能控制中枢 */
        .system-control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }
        .sys-toggle-group {
            display: flex;
            gap: 6px;
        }
        .sys-toggle-btn {
            background: rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        [data-theme="light"] .sys-toggle-btn {
            background: rgba(255,255,255,0.6);
        }
        .sys-toggle-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        #import-btn { letter-spacing: 0; }
        [onclick="clearAllData()"]:hover, .sys-toggle-btn[onclick="clearAllData()"]:hover {
            border-color: #ef4444 !important;
            color: #ef4444 !important;
            background: rgba(239,68,68,0.1) !important;
        }

        .view-switcher {
            display: flex;
            background: rgba(0, 0, 0, 0.1);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }
        [data-theme="light"] .view-switcher { background: rgba(0,0,0,0.04); }
        .view-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 10px 0;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 9px;
            transition: all 0.4s var(--ease-out-expo);
        }
        .view-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .cal-control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .cal-display-title { 
            font-size: 1.5rem; 
            font-weight: 800; 
            letter-spacing: -0.03em; 
            background: linear-gradient(to right, var(--text-main), var(--text-muted)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .nav-actions { display: flex; gap: 8px; align-items: center; }
        .nav-btn { background: var(--card-bg); border: 1px solid var(--border); width: 34px; height: 34px; border-radius: 8px; color: var(--text-muted); cursor: pointer; transition: all 0.25s var(--ease-out-expo); display: flex; align-items: center; justify-content: center; }
        [data-theme="light"] .nav-btn { background: rgba(255,255,255,0.7); }
        .nav-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-glow); transform: translateY(-1px); box-shadow: 0 4px 12px var(--primary-glow); }
        .nav-btn:active { transform: translateY(0) scale(0.92); }
        
        /* 核心追加：今日直达高光轻量化按钮 */
        .btn-nav-today {
            font-size: 0.8rem;
            font-weight: 700;
            padding: 0 12px;
            height: 36px;
            border-radius: 10px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: var(--primary);
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-nav-today:hover {
            background: var(--primary);
            color: #fff;
        }

        .calendar-render-engine { flex: 1; position: relative; overflow:hidden; min-height:0; touch-action:pan-y; will-change:transform,opacity; scrollbar-width:none; }
        .calendar-render-engine::-webkit-scrollbar { display:none; width:0; height:0; }
        @media (min-width:1001px) {
            .calendar-render-engine > .month-calendar-wrapper { height:100%; min-height:0; display:flex; flex-direction:column; }
            .calendar-render-engine .week-days-line { flex:0 0 auto; }
            .calendar-render-engine .grid-month { flex:1; min-height:0; grid-template-rows:repeat(6,minmax(0,1fr)); }
            .calendar-render-engine .grid-month .cell-unit { aspect-ratio:auto; min-height:0; }
            .calendar-render-engine .grid-year { height:100%; min-height:0; grid-template-rows:repeat(4,minmax(0,1fr)); align-content:stretch; }
            .calendar-render-engine .grid-year .cell-unit { min-height:0; padding:0; }
            .calendar-render-engine .grid-week { height:100%; min-height:0; grid-template-rows:repeat(7,minmax(0,1fr)); }
            .calendar-render-engine .grid-week .cell-unit { min-height:0; padding:6px 14px; }
        }
        .calendar-swipe-preview { position:absolute; inset:0; z-index:2; pointer-events:none; background:var(--bg-sidebar); will-change:transform,opacity; }
        .conflict-btn-fixed { align-self: flex-start; padding: 6px 14px; font-size: 0.75rem; white-space: nowrap; margin-top: 8px; }
        .conflict-btn-fixed.active { background: rgba(239, 68, 68, 0.15) !important; color: #ef4444 !important; border-color: #ef4444 !important; }
        .grid-animate-wrapper { animation: gridFadeIn 0.6s var(--ease-out-expo) forwards; }
        .week-days-line { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 14px; font-size: 0.8rem; font-weight: 700; color: var(--text-muted); }
        .universal-grid { display: grid; gap: 8px; }
        .grid-month { grid-template-columns: repeat(7, 1fr); }
        .grid-year { grid-template-columns: repeat(3, 1fr); gap: 16px; height: 100%; align-content: start; }
        .grid-week { grid-template-columns: 1fr; gap: 12px; }

        /* --- 日历物理网格单元 --- */
        .cell-unit {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s var(--ease-out-expo),
                        background-color 0.3s,
                        border-color 0.3s,
                        box-shadow 0.3s;
            will-change: transform;
        }
        [data-theme="light"] .cell-unit { background: rgba(0,0,0,0.01); }
        .grid-month .cell-unit { aspect-ratio: 1.1; font-size: 1rem; font-weight: 600; }
        .grid-month .cell-unit.sibling { opacity: 0.15; cursor: default; }
        .grid-year .cell-unit { padding: 24px 0; font-size: 1.1rem; font-weight: 700; }
        .grid-year .cell-unit:hover { background: rgba(255,255,255,0.05); border-color: var(--text-muted); }
        [data-theme="light"] .grid-year .cell-unit:hover { background: rgba(0,0,0,0.03); }

        .grid-week .cell-unit { flex-direction: row; justify-content: space-between; padding: 16px 20px; font-size: 1rem; }
        .week-left-desc { display: flex; align-items: center; gap: 12px; }
        .week-left-desc .w-name { font-size: 0.8rem; color: var(--text-muted); background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 4px; }
        [data-theme="light"] .week-left-desc .w-name { background: rgba(0,0,0,0.06); }

        .cell-unit.selected { background: var(--primary) !important; color: #fff !important; border-color: var(--primary) !important; box-shadow: 0 0 0 3px var(--primary-glow), 0 0 20px var(--primary-glow); }
        .cell-unit.selected .lunar-label { color:rgba(255,255,255,.82); }
        .cell-unit.today { border: 2px solid var(--primary) !important; box-shadow: 0 0 0 2px var(--primary-glow), 0 0 12px var(--primary-glow); }
        .cell-unit.today.selected { border-color: var(--primary) !important; }
        .cell-unit.search-hit { background: rgba(245, 158, 11, 0.2) !important; border-color: #f59e0b !important; box-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }
        .cell-unit.conflict { background: rgba(239, 68, 68, 0.15) !important; border-color: #ef4444 !important; box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
        .schedule-meta-card.search-hit { border-color: #f59e0b !important; box-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }

        /* 日期悬停气泡 */
        .cell-tooltip { position: absolute; z-index: 200; background: var(--modal-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; min-width: 180px; max-width: 260px; box-shadow: var(--shadow-lg); pointer-events: none; opacity: 0; transform: translateY(4px); transition: opacity 0.2s, transform 0.2s; }
        .cell-tooltip.show { opacity: 1; transform: translateY(0); }
        .tooltip-date { font-size: 0.78rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; }
        .tooltip-event { font-size: 0.75rem; color: var(--text-main); padding: 3px 0; display: flex; align-items: center; gap: 6px; }
        .tooltip-event .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .tooltip-event.urgent .dot { background: #ef4444; }
        .tooltip-event.work .dot { background: #3b82f6; }
        .tooltip-empty { font-size: 0.72rem; color: var(--text-muted); font-style: italic; }
        .tooltip-weeknum { position: absolute; top: -18px; right: 6px; font-size: 0.6rem; color: var(--primary); font-weight: 700; opacity: 0.6; }
        .grid-month .cell-unit { position: relative; }
        .grid-month .cell-unit .weeknum { display:none; }
        .lunar-label { max-width:90%; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:.52rem; line-height:1; color:var(--text-muted); font-weight:500; }
        .holiday-flags { position:absolute; left:3px; top:2px; display:flex; gap:1px; font-size:.52rem; line-height:1; }
        .day-number { position:relative; z-index:1; }
        .cell-unit.china-holiday { background:linear-gradient(145deg,rgba(239,68,68,.16),rgba(239,68,68,.045)); border-color:rgba(239,68,68,.5); box-shadow:inset 0 0 0 1px rgba(239,68,68,.08); }
        .cell-unit.china-holiday .day-number { color:#dc2626; font-weight:850; }
        .cell-unit.egypt-holiday { background:linear-gradient(145deg,rgba(245,158,11,.17),rgba(245,158,11,.045)); border-color:rgba(245,158,11,.55); box-shadow:inset 0 0 0 1px rgba(245,158,11,.1); }
        .cell-unit.egypt-holiday .day-number { color:#d97706; font-weight:850; }
        [data-theme="dark"] .cell-unit.china-holiday .day-number { color:#fca5a5; }
        [data-theme="dark"] .cell-unit.egypt-holiday .day-number { color:#fcd34d; }
        .cell-unit.selected .day-number { color:#fff !important; }
        .cell-unit.makeup-workday { border-style:dashed; }
        .holiday-legend { display:flex; flex-wrap:wrap; align-items:center; gap:6px 12px; margin-top:8px; font-size:.66rem; color:var(--text-muted); }
        .holiday-legend span { display:inline-flex; align-items:center; gap:4px; }
        .holiday-legend-source { opacity:.7; }
        .holiday-label-list { width:100%; display:flex; gap:6px; overflow-x:auto; padding:3px 1px 2px; scrollbar-width:none; scroll-snap-type:x proximity; }
        .holiday-label-list::-webkit-scrollbar { display:none; }
        .holiday-chip { flex:0 0 auto; max-width:260px; padding:5px 8px; border-radius:8px; font-size:.64rem; font-weight:650; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; scroll-snap-align:start; border:1px solid var(--border); background:var(--card-bg); color:var(--text-main); }
        .holiday-chip.cn { border-color:rgba(239,68,68,.28); background:rgba(239,68,68,.07); }
        .holiday-chip.eg { border-color:rgba(245,158,11,.3); background:rgba(245,158,11,.08); }
        .holiday-chip.workday { border-style:dashed; color:var(--text-muted); }
        .holiday-chip-empty { color:var(--text-muted); opacity:.7; font-size:.62rem; padding:4px 0; }
        
        .busy-bar { position:absolute; bottom:2px; width:10px; height:1px; border-radius:1px; opacity:.55; transition:background-color .3s,opacity .3s; }
        .status-free { background:var(--busy-free); box-shadow:none; }
        .status-light { background:var(--busy-light); box-shadow:none; }
        .status-heavy { background:var(--busy-heavy); box-shadow:none; }
        .status-critical { background:var(--busy-critical); box-shadow:none; }
        .cell-unit.selected .busy-bar { background:#fff !important; box-shadow:none; opacity:.62; }

        /* 侧边折叠箭头 */
        .sidebar-collapse-btn { position: absolute; left: 480px; top: 50%; transform: translateY(-50%); width: 22px; height: 48px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 0 10px 10px 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; color: var(--text-muted); transition: all 0.3s; z-index: 50; backdrop-filter: blur(4px); }
        .sidebar-collapse-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
        .sidebar-collapse-btn .arrow { transition: transform 0.3s; }
        .sidebar-collapse-btn:not(.expanded) .arrow { transform: rotate(180deg); }
        .sidebar-collapse-btn:not(.expanded) { left: 0; }

        /* ================= 右栏：立体物理高精时间轴 ================= */
        .timeline-panel {
            flex: 1;
            padding: 40px 48px;
            display: flex;
            flex-direction: column;
            background: var(--bg-timeline);
        }
        .panel-top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .panel-top-bar h2 { font-size: 1.6rem; font-weight: 800; }
        .btn-trigger-add { background: linear-gradient(135deg, var(--primary) 0%, #4338ca 100%); color: #fff; border: none; padding: 12px 24px; border-radius: 12px; font-size: 0.9rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4); transition: all 0.3s; }
        .btn-trigger-add:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6); }

        .axis-scroll-container { flex: 1; overflow-y: auto; padding-right: 10px; position: relative; }

        /* 导入数据表格区域 */
        .import-table-panel { display: none; }
        .import-table-panel.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .import-table-tabs { display: flex; gap: 4px; margin-bottom: 20px; }
        .import-tab-btn { padding: 6px 16px; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: var(--text-muted); font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .import-tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .import-table-wrap { flex: 1; overflow-y: auto; padding-right: 4px; }
        .import-table-wrap table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .import-table-wrap thead { position: sticky; top: 0; z-index: 2; }
        .import-table-wrap th { padding: 10px 14px; text-align: left; font-weight: 700; font-size: 0.72rem; text-transform: uppercase; color: var(--text-muted); background: var(--modal-bg); border-bottom: 2px solid var(--border); white-space: nowrap; }
        .import-table-wrap td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text-main); vertical-align: middle; max-width: 260px; }
        .import-table-wrap tr:hover td { background: rgba(255,255,255,0.03); }
        .import-table-wrap .col-title { font-weight: 600; }
        .import-table-wrap .col-time { white-space: nowrap; color: var(--text-muted); font-weight: 600; }
        .import-table-wrap .col-date { white-space: nowrap; color: var(--text-muted); font-size: 0.75rem; }
        .import-table-wrap .type-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .type-badge.work { background: rgba(59,130,246,0.15); color: #2563eb; }
        .type-badge.urgent { background: rgba(239,68,68,0.15); color: #dc2626; }
        .import-table-wrap .col-reporter, .import-table-wrap .col-attendees { font-size: 0.75rem; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .import-table-wrap .col-desc { font-size: 0.72rem; color: var(--text-muted); line-height: 1.4; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .import-table-wrap .col-expand { width: 32px; padding: 10px 8px; cursor: pointer; color: var(--text-muted); font-size: 0.9rem; text-align: center; user-select: none; transition: transform 0.3s; }
        .import-table-wrap .col-expand.open { transform: rotate(90deg); }
        .import-table-wrap .expand-row { display: none; }
        .import-table-wrap .expand-row.open { display: table-row; }
        .import-table-wrap .expand-row td { padding: 0; border-bottom: 1px solid var(--border); background: var(--card-bg); }
        .import-table-wrap .expand-inner { padding: 14px 14px 14px 54px; font-size: 0.78rem; color: var(--text-muted); line-height: 1.6; }
        .import-table-wrap .expand-inner strong { color: var(--text-main); font-weight: 700; }
        .import-table-wrap .expand-desc-full { margin-bottom: 10px; background: rgba(255,255,255,0.03); padding: 10px 14px; border-radius: 8px; border-left: 3px solid var(--primary); line-height: 1.6; color: var(--text-main); font-size: 0.82rem; white-space: pre-wrap; word-break: break-all; }
        [data-theme="light"] .import-table-wrap .expand-desc-full { background: rgba(0,0,0,0.04); }
        .import-table-summary { margin-top: 16px; display: flex; gap: 16px; flex-wrap: wrap; }
        .import-stat-chip { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); }
        .import-stat-chip span { color: var(--primary); font-size: 1rem; }
        .import-empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 0.9rem; }
        .import-empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
        .import-actions { margin-bottom: 16px; display: flex; gap: 8px; align-items: center; }
        .import-actions .btn-clear { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .import-actions .btn-clear:hover { background: rgba(239,68,68,0.2); }
        .import-actions .btn-export { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .import-actions .btn-export:hover { background: rgba(16,185,129,0.2); }
        .axis-scroll-container::-webkit-scrollbar { width: 6px; }
        .axis-scroll-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        [data-theme="light"] .axis-scroll-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); }

        .timeline-wrapper { position: relative; padding-left: 100px; min-height: 100%; }
        .timeline-wrapper::before {
            content: '';
            position: absolute;
            left: 80px;
            top: 10px;
            bottom: 10px;
            width: 2px;
            background: linear-gradient(to bottom, rgba(99,102,241,0.4) 0%, rgba(255,255,255,0.03) 100%);
            border-radius: 1px;
        }
        [data-theme="light"] .timeline-wrapper::before {
            background: linear-gradient(to bottom, rgba(99,102,241,0.4) 0%, rgba(0,0,0,0.03) 100%);
        }

        .axis-node-row { display: flex; position: relative; margin-bottom: 20px; animation: nodeSlideIn 0.5s var(--ease-out-expo) forwards; }
        .axis-time-label { position: absolute; left: -100px; width: 70px; text-align: right; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); top: 14px; }
        .axis-anchor-dot { position: absolute; left: -24px; top: 18px; width: 10px; height: 10px; border-radius: 50%; background: var(--modal-bg); border: 2px solid var(--text-muted); z-index: 5; transition: all 0.3s; }

        .schedule-meta-card {
            flex: 1;
            padding: 16px 20px;
            border-radius: 16px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-left: 5px solid transparent;
            transition: all 0.4s var(--ease-out-expo);
        }
        .schedule-meta-card.is-real { cursor: pointer; }
        .schedule-meta-card.is-real:hover {
            transform: translateX(6px);
            background: var(--card-hover);
            border-top-color: rgba(255,255,255,0.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .schedule-meta-card.is-real:hover ~ .axis-anchor-dot { border-color: var(--primary); background: var(--primary); box-shadow: 0 0 10px var(--primary); }
        .card-row-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .card-main-title { font-size: 1.05rem; font-weight: 700; color: var(--text-main); }
        .card-time-span { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }
        .card-meta-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
        .meta-tag { font-size: 0.72rem; font-weight: 600; padding: 2px 8px; border-radius: 6px; background: rgba(255,255,255,0.06); color: var(--text-muted); white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
        [data-theme="light"] .meta-tag { background: rgba(0,0,0,0.06); }

        .node-urgent { border-left-color: #ef4444; background: linear-gradient(to right, rgba(239,68,68,0.06), transparent); }
        .node-urgent .axis-anchor-dot { border-color: #ef4444; }
        .node-work { border-left-color: #3b82f6; background: linear-gradient(to right, rgba(59,130,246,0.06), transparent); }
        .node-work .axis-anchor-dot { border-color: #3b82f6; }
        .node-free, .is-free { border: 1px dashed var(--border); border-left: 4px dashed rgba(16, 185, 129, 0.4); background: transparent; cursor: pointer; }
        .node-free .card-main-title, .is-free .card-main-title { color: var(--text-muted); font-weight: 400; font-style: italic; font-size: 0.95rem; }
        .node-free .axis-anchor-dot, .is-free .axis-anchor-dot { border-color: var(--border); background: transparent; }
        .is-free:hover { background: rgba(16, 185, 129, 0.05); border-color: rgba(16, 185, 129, 0.3); transform: translateX(3px); transition: all 0.3s; }
        .is-free .card-main-title { color: var(--text-muted); font-weight: 400; font-style: italic; font-size: 0.9rem; }
        .is-free .card-time-span { font-size: 0.75rem; }
        .free-add-hint { font-size: 0.68rem; color: var(--text-muted); opacity: 0; margin-top: 4px; transition: opacity 0.2s; font-style: italic; }
        .is-free:hover .free-add-hint { opacity: 0.7; }

        /* ================= 高定系统级右键上下文菜单（Context Menu） ================= */
        .custom-context-menu {
            position: fixed;
            background: var(--ctx-menu-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            padding: 6px;
            z-index: 1000;
            display: none;
            min-width: 160px;
        }
        .ctx-item {
            padding: 10px 14px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .ctx-item:hover {
            background: var(--ctx-item-hover);
            color: var(--primary);
        }
        .ctx-divider {
            height: 1px;
            background: var(--border);
            margin: 4px 0;
        }

        /* ================= 浮层表单弹窗 ================= */
        .glass-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 100; opacity: 0; transition: opacity 0.3s; }
        .glass-overlay.show { display: flex; opacity: 1; }
        .panel-modal { background: var(--modal-bg); padding: 32px; border-radius: 20px; width: 100%; max-width: 440px; border: 1px solid var(--border); box-shadow: var(--shadow-lg); transform: scale(0.85) translateY(20px); opacity: 0; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s; }
        .glass-overlay.show .panel-modal { transform: scale(1) translateY(0); opacity: 1; }
        .m-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 20px; }
        .m-group { margin-bottom: 18px; }
        .m-group label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
        .m-group input, .m-group select { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text-main); font-size: 0.95rem; outline: none; transition: border 0.3s; }
        .m-group input:focus, .m-group select:focus, textarea:focus { border-color: var(--primary); }
        .m-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
        .b-cancel { background: rgba(255,255,255,0.05); color: var(--text-muted); border: none; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        [data-theme="light"] .b-cancel { background: rgba(0,0,0,0.05); }
        .b-save { background: var(--primary); color: #fff; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .b-del { background: rgba(239,68,68,0.2); color: #fca5a5; border: none; padding: 10px 18px; border-radius: 10px; cursor: pointer; margin-right: auto; display: none; font-weight: 600; }
        [data-theme="light"] .b-del { color: #dc2626; background: rgba(239,68,68,0.1); }

        @keyframes canvasIntro { from { opacity: 0; transform: translateY(30px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes gridFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes nodeSlideIn { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }

        /* 按钮点击涟漪 */
        .ripple-btn { position: relative; overflow: hidden; }
        .ripple-btn .ripple-circle { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.25); transform: scale(0); animation: rippleAnim 0.6s ease-out forwards; pointer-events: none; }

        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }

        /* 空闲时段呼吸动画 */
        @keyframes freeBreath {
            0%, 100% { border-color: rgba(16, 185, 129, 0.2); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.1); }
            50% { border-color: rgba(16, 185, 129, 0.5); box-shadow: 0 0 12px 2px rgba(16, 185, 129, 0.15); }
        }
        .is-free { animation: freeBreath 3s ease-in-out infinite; }
        .is-free:hover { animation: none; }

        /* 日历格子按压反馈 */
        .cell-unit { cursor: pointer; transition: transform 0.15s var(--ease-out-expo), box-shadow 0.2s, border-color 0.2s; }
        .cell-unit:active { transform: scale(0.92) !important; box-shadow: 0 0 0 3px var(--primary-glow) !important; }

        /* Tab 滑动指示器 */
        .view-switcher { position: relative; display: flex; }
        .view-switcher::after { content: ''; position: absolute; bottom: -1px; height: 2px; background: var(--primary); border-radius: 2px; transition: left 0.35s var(--ease-out-expo), width 0.35s var(--ease-out-expo); }

        /* 长期使用增强：响应式、键盘焦点、同步状态与筛选工具栏 */
        :focus-visible { outline: 3px solid var(--primary); outline-offset: 2px; }
        .sync-indicator { font-size: .7rem; color: var(--text-muted); padding: 5px 9px; border-radius: 8px; background: var(--input-bg); white-space: nowrap; }
        .sync-indicator.ok { color: var(--busy-free); }
        .sync-indicator.error { color: var(--busy-critical); }
        .schedule-filter-bar { display: grid; grid-template-columns: minmax(130px,1fr) 110px 130px 130px auto; gap: 8px; margin-bottom: 12px; }
        .schedule-filter-bar input, .schedule-filter-bar select { min-width: 0; padding: 7px 9px; background: var(--input-bg); color: var(--text-main); border: 1px solid var(--border); border-radius: 8px; font-size: .75rem; }
        .conflict-summary { display:none; margin-bottom:12px; padding:10px 12px; border:1px solid rgba(239,68,68,.35); background:rgba(239,68,68,.08); border-radius:10px; color:var(--text-main); font-size:.76rem; line-height:1.6; }
        .conflict-summary.show { display:block; }
        .conflict-link { color:var(--busy-critical); cursor:pointer; text-decoration:underline; margin-right:10px; }
        .snapshot-panel { position:fixed; inset:0; z-index:1200; display:none; place-items:center; padding:20px; background:rgba(15,23,42,.6); backdrop-filter:blur(4px); }
        .snapshot-panel.show { display:grid; }
        .snapshot-card { width:min(560px,100%); max-height:min(650px,85vh); overflow:auto; padding:24px; background:var(--modal-bg); border:1px solid var(--border); border-radius:18px; box-shadow:var(--shadow-lg); }
        .snapshot-row { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
        .snapshot-row-main { flex:1; min-width:0; }
        .snapshot-row button { padding:7px 12px; border:0; border-radius:8px; cursor:pointer; background:var(--primary); color:white; }
        .import-preview-list { max-height:240px; overflow:auto; margin:12px 0; padding:10px; background:var(--input-bg); border-radius:10px; font-size:.78rem; line-height:1.7; }
        .dragging { opacity:.45; }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration:.01ms !important; transition-duration:.01ms !important; } }
        @media (max-height: 850px) and (min-width: 1001px) {
            body { padding:16px; }
            .dashboard-canvas { height:calc(100vh - 32px); min-height:0; }
            .sidebar { padding-top:22px; padding-bottom:22px; }
            .timeline-panel { padding-top:22px; padding-bottom:22px; }
        }
        @media (max-width: 1000px) {
            body { padding:0; align-items:stretch; overflow:auto; }
            .dashboard-canvas { height:auto; min-height:100vh; border-radius:0; flex-direction:column; overflow:visible; }
            .sidebar { width:100%; padding:22px 18px; border-right:0; border-bottom:1px solid var(--border); max-height:none; }
            .sidebar.collapsed { width:100%; height:0; padding:0 18px; }
            .sidebar-collapse-btn { position:fixed; right:12px; top:12px; transform:none; border:1px solid var(--border); border-radius:10px; height:36px; width:36px; z-index:100; }
            .timeline-panel { min-height:620px; padding:22px 18px; }
            .schedule-filter-bar { grid-template-columns:1fr 1fr; }
        }
        @media (max-width: 600px) {
            body { background:var(--bg-canvas); }
            .dashboard-canvas { border:0; box-shadow:none; background:transparent; }
            .sidebar { padding:12px 14px 16px; background:var(--bg-sidebar); }
            .system-control-bar { display:block; margin-bottom:10px; }
            .sys-toggle-group { width:100%; display:block; }
            .mobile-quick-actions { display:flex; gap:6px; overflow-x:auto; padding:2px 1px 8px; scrollbar-width:none; scroll-snap-type:x proximity; }
            .mobile-quick-actions::-webkit-scrollbar { display:none; }
            .mobile-quick-actions .sys-toggle-btn { flex:0 0 auto; scroll-snap-align:start; min-height:36px; padding:7px 11px; font-size:.72rem; }
            #global-search { width:100% !important; height:40px; font-size:.82rem !important; margin-top:2px; }
            .sync-indicator { display:inline-flex; margin-top:7px; padding:4px 8px; font-size:.66rem; }
            .view-switcher { margin:10px 0 14px; border-radius:10px; }
            .view-btn { padding:9px 0; font-size:.82rem; }
            .cal-control-header { margin-bottom:10px; }
            .cal-display-title { font-size:1.25rem; }
            .nav-actions { gap:5px; }
            .nav-btn { width:32px; height:32px; }
            .btn-nav-today { height:32px; padding:0 10px; }
            .week-days-line { margin-bottom:6px; font-size:.72rem; }
            .universal-grid { gap:4px; }
            .grid-month .cell-unit { aspect-ratio:auto; height:42px; border-radius:9px; font-size:.86rem; box-shadow:none; }
            .grid-month .cell-unit { height:48px; }
            .grid-month .cell-unit .weeknum { display:none; }
            .lunar-label { font-size:.43rem; margin-top:2px; }
            .holiday-flags { font-size:.46rem; left:2px; top:2px; }
            .holiday-legend { gap:5px 10px; font-size:.6rem; }
            .holiday-label-list { margin-top:1px; }
            .holiday-chip { max-width:220px; padding:5px 7px; font-size:.6rem; }
            .busy-bar { bottom:2px; width:9px; height:1px; box-shadow:none; opacity:.5; }
            .cell-unit.selected { box-shadow:0 4px 10px var(--primary-glow) !important; }
            .cell-unit.today { border-width:1px !important; box-shadow:inset 0 0 0 1px var(--primary) !important; }
            .conflict-btn-fixed { width:auto; margin-top:8px !important; padding:5px 9px !important; font-size:.68rem !important; }
            .cell-tooltip { display:none !important; }
            .sidebar-collapse-btn { display:none; }
            .timeline-panel { min-height:auto; padding:18px 14px 28px; border-top:8px solid var(--border); }
            .panel-top-bar { align-items:center; flex-direction:row; gap:10px; margin-bottom:14px; }
            .panel-top-bar h2 { min-width:0; font-size:1.15rem; line-height:1.25; }
            .btn-trigger-add { flex:0 0 auto; padding:9px 12px; font-size:.76rem; border-radius:9px; box-shadow:0 3px 10px rgba(99,102,241,.25); }
            .import-table-tabs { margin-bottom:12px; }
            .import-tab-btn { flex:1; padding:8px 6px; font-size:.72rem; }
            .schedule-filter-bar { grid-template-columns:minmax(0,1fr) 112px; }
            .schedule-filter-bar { gap:6px; margin-bottom:10px; }
            .schedule-filter-bar input, .schedule-filter-bar select { min-height:38px; }
            #filter-date-from, #filter-date-to, .schedule-filter-bar > button { display:none; }
            .axis-scroll-container { overflow:visible; padding-right:0; }
            .timeline-wrapper { padding-left:0; }
            .timeline-wrapper::before, .axis-anchor-dot { display:none; }
            .axis-node-row { margin-bottom:10px; }
            .axis-time-label { position:static; width:48px; flex:0 0 48px; padding-top:12px; font-size:.7rem; text-align:left; }
            .schedule-meta-card { padding:12px 13px; border-radius:12px; }
            .card-main-title { font-size:.9rem; line-height:1.35; }
            .card-time-span { font-size:.68rem; }
            .meta-tag { max-width:150px; font-size:.65rem; }
            .free-add-hint { opacity:.65; }
            .grid-year { grid-template-columns:repeat(2,1fr); }
            .panel-modal { max-height:92vh; overflow:auto; padding:20px; border-radius:14px; }
            .import-table-wrap { overflow:auto; }
            .import-table-wrap table { min-width:900px; }
            .custom-context-menu { max-width:calc(100vw - 24px); }
        }
    </style>
</head>
<body>

    <div class="dashboard-canvas" id="main-canvas">
        <div class="sidebar">
            <div class="system-control-bar">
                <div class="sys-toggle-group" style="gap:6px; flex-wrap:wrap;">
                    <div class="mobile-quick-actions">
                    <button class="sys-toggle-btn" onclick="toggleTheme()" id="theme-btn">☀️ LIGHT</button>
                    <button class="sys-toggle-btn" onclick="toggleLang()" id="lang-btn">EN</button>
                    <button class="sys-toggle-btn" id="import-btn" title="导入Excel日程">📥 导入</button>
                    <button class="sys-toggle-btn" id="ics-import-btn" title="导入 ICS 日历">📆 ICS</button>
                    <button class="sys-toggle-btn" onclick="exportICS()" title="导出 ICS 日历">⬇ ICS</button>
                    <button class="sys-toggle-btn" onclick="openSnapshots()" title="备份与恢复">↶ 备份</button>
                    <button class="sys-toggle-btn" onclick="clearAllData()" title="清空所有日程">🗑 清空</button>
                    </div>
                    <input type="text" id="global-search" placeholder="🔍 搜索日程" style="background:var(--input-bg);border:1px solid var(--border);border-radius:8px;padding:5px 10px;color:var(--text-main);font-size:0.75rem;outline:none;width:140px;transition:border 0.3s;" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border)'">
                </div>
                <input type="file" id="excel-import-input" accept=".xlsx,.csv" style="display:none">
                <input type="file" id="ics-import-input" accept=".ics,text/calendar" style="display:none">
                <span class="sync-indicator" id="sync-indicator" aria-live="polite">本地模式</span>
            </div>

            <div class="view-switcher" style="display:flex; align-items:center;">
                <button class="view-btn" id="v-year" onclick="switchView('year')">年看板</button>
                <button class="view-btn active" id="v-month" onclick="switchView('month')">月日程</button>
                <button class="view-btn" id="v-week" onclick="switchView('week')">周编排</button>
            </div>

            <div class="cal-control-header">
                <span class="cal-display-title" id="cal-headline">2026年 07月</span>
                <div class="nav-actions">
                    <button class="btn-nav-today" onclick="jumpToToday()" id="btn-today">今日</button>
                    <button class="nav-btn" onclick="navigateCalendar(-1)" title="上一期">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <button class="nav-btn" onclick="navigateCalendar(1)" title="下一期">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                </div>
            </div>

            <div class="calendar-render-engine" id="cal-engine-container"></div>
            <div class="holiday-legend" id="holiday-legend">
                <div class="holiday-label-list" id="holiday-label-list"></div>
            </div>
            <button class="sys-toggle-btn conflict-btn-fixed" onclick="toggleConflictHighlight()" id="conflict-btn" title="冲突检测" style="margin-top:8px; align-self: flex-start; padding: 6px 12px; font-size: 0.75rem; white-space: nowrap;">⚠️ 冲突检测</button>
        </div>

        <button class="sidebar-collapse-btn expanded" id="collapse-btn" onclick="toggleSidebarCollapse()" title="折叠/展开日历">
            <span class="arrow">‹</span>
        </button>

        <div class="timeline-panel">
            <div class="panel-top-bar">
                <h2 id="timeline-headline">本日日程架构线</h2>
                <button class="btn-trigger-add" onclick="openAddModal()" id="btn-add-main">+ 编排新事务</button>
            </div>

            <div class="import-table-tabs">
                <button class="import-tab-btn active" id="tab-timeline" onclick="switchRightPanel('timeline')">📅 日程时间轴</button>

    <script>
        // --- 国际化超脑多模字典 ---
        const I18N_DICT = {

                yearHeadline: "Annual Horizon Dashboard", weekHeadline: "Priority Deployment Week"
            }
        };

        let currentLang = localStorage.getItem('EXEC_HORIZON_LANG') || 'zh';
        let currentTheme = localStorage.getItem('EXEC_HORIZON_THEME') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);

        // --- 数据内核守护 ---
        function readLocalSchedule() {
            try { return JSON.parse(localStorage.getItem("EXEC_HORIZON_DATA")) || {}; }
            catch (err) { console.warn('Local schedule is invalid:', err); return {}; }
        }
        let STORAGE_CORE = readLocalSchedule();
        let remoteSyncEnabled = false;
        let remoteSaveTimer = null;
        let lastSaveReason = '自动保存';
        const TOOL_SLUG = location.pathname.split('/').filter(Boolean)[1] || 'tool-mrhqjeya';
        function authHeaders() {
            const token = localStorage.getItem('tools_token');
            return token ? { Authorization: `Bearer ${token}` } : {};
        }
        function setSyncState(text, kind = '') {
            const el = document.getElementById('sync-indicator');
            if (!el) return;
            el.textContent = text;
            el.className = `sync-indicator ${kind}`;
        }
        async function saveRemoteState(reason = '自动保存', createSnapshot = true) {
            if (!remoteSyncEnabled) return;
            setSyncState('正在同步...');
            const res = await fetch(`/api/custom-tools/${encodeURIComponent(TOOL_SLUG)}/state`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', ...authHeaders() },
                body: JSON.stringify({ data: STORAGE_CORE, reason, createSnapshot })
            });
            const body = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
            setSyncState('已同步', 'ok');
        }
        function persist(reason = '自动保存', createSnapshot = true) {
            localStorage.setItem("EXEC_HORIZON_DATA", JSON.stringify(STORAGE_CORE));
            lastSaveReason = reason;
            clearTimeout(remoteSaveTimer);
            remoteSaveTimer = setTimeout(() => saveRemoteState(lastSaveReason, createSnapshot).catch(err => {
                console.error('Remote schedule sync failed:', err);
                setSyncState('同步失败，已保存在本机', 'error');
            }), 250);
        }

        let currentView = 'month';
        function localDateString(date = new Date()) {
            return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
        }
        const HOLIDAY_DATA = {};
        function addHolidayRange(country, start, end, name, nameEn, type = 'holiday') {
            const cursor = new Date(`${start}T12:00:00`), last = new Date(`${end}T12:00:00`);
            while (cursor <= last) {
                const key = localDateString(cursor);
                (HOLIDAY_DATA[key] ||= []).push({ country, name, nameEn, type });
                cursor.setDate(cursor.getDate() + 1);
            }
        }
        // 中国：国务院办公厅 2026 年部分节假日安排（含调休上班日）
        addHolidayRange('CN','2026-01-01','2026-01-03','元旦','New Year');
        addHolidayRange('CN','2026-01-04','2026-01-04','调休上班','Make-up workday','workday');
        addHolidayRange('CN','2026-02-15','2026-02-23','春节','Spring Festival');
        addHolidayRange('CN','2026-02-14','2026-02-14','调休上班','Make-up workday','workday');
        addHolidayRange('CN','2026-02-28','2026-02-28','调休上班','Make-up workday','workday');
        addHolidayRange('CN','2026-04-04','2026-04-06','清明节','Qingming Festival');
        addHolidayRange('CN','2026-05-01','2026-05-05','劳动节','Labor Day');
        addHolidayRange('CN','2026-05-09','2026-05-09','调休上班','Make-up workday','workday');
        addHolidayRange('CN','2026-06-19','2026-06-21','端午节','Dragon Boat Festival');
        addHolidayRange('CN','2026-09-25','2026-09-27','中秋节','Mid-Autumn Festival');
        addHolidayRange('CN','2026-10-01','2026-10-07','国庆节','National Day');
        addHolidayRange('CN','2026-09-20','2026-09-20','调休上班','Make-up workday','workday');
        addHolidayRange('CN','2026-10-10','2026-10-10','调休上班','Make-up workday','workday');
        // 埃及：埃及总统府 National Holidays 2026
        addHolidayRange('EG','2026-01-07','2026-01-07','科普特圣诞节','Coptic Christmas');
        addHolidayRange('EG','2026-01-29','2026-01-29','革命与警察节','Revolution & Police Day');
        addHolidayRange('EG','2026-03-19','2026-03-23','开斋节','Eid Al-Fitr');
        addHolidayRange('EG','2026-04-13','2026-04-13','闻风节','Sham El-Nessim');
        addHolidayRange('EG','2026-04-25','2026-04-25','西奈解放日','Sinai Liberation Day');
        addHolidayRange('EG','2026-05-07','2026-05-07','劳动节','Labor Day');
        addHolidayRange('EG','2026-05-26','2026-05-26','阿拉法特日','Arafat Day');
        addHolidayRange('EG','2026-05-27','2026-05-31','宰牲节','Eid Al-Adha');
        addHolidayRange('EG','2026-06-18','2026-06-18','伊斯兰新年','Islamic New Year');
        addHolidayRange('EG','2026-07-02','2026-07-02','六月三十日革命纪念','June 30 Revolution');
        addHolidayRange('EG','2026-07-23','2026-07-23','七月革命纪念日','July 23 Revolution');
        addHolidayRange('EG','2026-08-26','2026-08-26','先知诞辰','Mawlid Al-Nabi');
        addHolidayRange('EG','2026-10-06','2026-10-06','武装部队日','Armed Forces Day');
        function getHolidayInfo(dateStr) { return HOLIDAY_DATA[dateStr] || []; }
        function getLunarLabel(date) {
            try {
                if (!window.Solar) return '';
                const lunar = window.Solar.fromYmd(date.getFullYear(), date.getMonth()+1, date.getDate()).getLunar();
                const festivals = lunar.getFestivals();
                if (festivals && festivals.length) return festivals[0];
                const day = lunar.getDayInChinese();
                return day === '初一' ? `${lunar.getMonthInChinese()}月` : day;
            } catch (err) { return ''; }
        }
        function getCalendarMeta(dateStr, date) {
            const holidays = getHolidayInfo(dateStr);
            return {
                lunar: getLunarLabel(date),
                holidays,
                flags: [...new Set(holidays.map(item => item.country === 'CN' ? '🇨🇳' : '🇪🇬'))].join(''),
                title: holidays.map(item => `${item.country === 'CN' ? '中国' : '埃及'}：${currentLang === 'zh' ? item.name : item.nameEn}`).join('；')
            };
        }
        function getVisibleHolidayEntries() {
            const year = anchorDate.getFullYear();
            let from, to;
            if (currentView === 'year') {
                from = `${year}-01-01`; to = `${year}-12-31`;
            } else if (currentView === 'month') {
                const month = String(anchorDate.getMonth()+1).padStart(2,'0');
                from = `${year}-${month}-01`;
                to = localDateString(new Date(year, anchorDate.getMonth()+1, 0, 12));
            } else {
                const start = new Date(anchorDate); start.setHours(12,0,0,0); start.setDate(start.getDate()-start.getDay());
                const end = new Date(start); end.setDate(start.getDate()+6);
                from = localDateString(start); to = localDateString(end);
            }
            const rows = [];
            Object.keys(HOLIDAY_DATA).sort().forEach(date => {
                if (date < from || date > to) return;
                HOLIDAY_DATA[date].forEach(item => rows.push({ date, ...item }));
            });
            return rows;
        }
        function groupVisibleHolidays(rows) {
            const groups = [];
            rows.forEach(row => {
                const previous = groups[groups.length-1];
                const previousDate = previous && new Date(`${previous.end}T12:00:00`);
                const currentDate = new Date(`${row.date}T12:00:00`);
                const consecutive = previousDate && Math.round((currentDate-previousDate)/86400000) === 1;
                if (previous && consecutive && previous.country===row.country && previous.name===row.name && previous.type===row.type) {
                    previous.end = row.date;
                } else {
                    groups.push({ ...row, start:row.date, end:row.date });
                }
            });
            return groups;
        }
        function formatHolidayRange(start, end) {
            const a = start.slice(5).replace('-','/'), b = end.slice(5).replace('-','/');
            return start === end ? a : `${a}–${b}`;
        }
        function renderHolidayLegend() {
            const list = document.getElementById('holiday-label-list');
            if (!list) return;
            const rows = groupVisibleHolidays(getVisibleHolidayEntries());
            if (!rows.length) {
                list.innerHTML = `<span class="holiday-chip-empty">${currentLang === 'zh' ? '当前视图暂无中埃官方假期' : 'No official China/Egypt holidays in this view'}</span>`;
                return;
            }
            list.innerHTML = rows.map(item => `<span class="holiday-chip ${item.country === 'CN' ? 'cn' : 'eg'} ${item.type === 'workday' ? 'workday' : ''}" title="${escapeHtml(item.country === 'CN' ? '中国' : '埃及')} · ${escapeHtml(currentLang === 'zh' ? item.name : item.nameEn)}">${item.country === 'CN' ? '🇨🇳' : '🇪🇬'} ${formatHolidayRange(item.start,item.end)} · ${escapeHtml(currentLang === 'zh' ? item.name : item.nameEn)}</span>`).join('');
        }
        const savedDate = localStorage.getItem('EXEC_HORIZON_SELECTED_DATE');
        let selectedDateStr = /^\d{4}-\d{2}-\d{2}$/.test(savedDate || '') ? savedDate : localDateString();
        let anchorDate = new Date(`${selectedDateStr}T12:00:00`);
        let currentFilters = { person: '', type: '', from: '', to: '' };

        const container = document.getElementById("cal-engine-container");

        // 滚轮切换日历（月/周视图前后月，年视图前后年）
        container.addEventListener('wheel', function(e) {
            if (e.target.closest('input, select, textarea')) return;
            e.preventDefault();
            const dir = e.deltaY > 0 ? 1 : -1;
            if (currentView === 'month') anchorDate.setMonth(anchorDate.getMonth() + dir);
            else if (currentView === 'year') anchorDate.setFullYear(anchorDate.getFullYear() + dir);
            else if (currentView === 'week') anchorDate.setDate(anchorDate.getDate() + dir * 7);
            renderCalendarPart();
        }, { passive: false });

        // --- 全局搜索 ---
        document.getElementById('global-search').addEventListener('input', function(e) {
            const q = e.target.value.trim().toLowerCase();
            if (!q) { clearSearchHighlight(); return; }
            applySearchHighlight(q);
        });

        function clearSearchHighlight() {
            document.querySelectorAll('.cell-unit.search-hit, .schedule-meta-card.search-hit').forEach(el => el.classList.remove('search-hit'));
        }

        function applySearchHighlight(q) {
            clearSearchHighlight();
            // 搜索日程卡片
            const allCards = document.querySelectorAll('.schedule-meta-card.is-real');
            allCards.forEach(card => {
                const title = (card.dataset.title || '').toLowerCase();
                const reporter = (card.dataset.reporter || '').toLowerCase();
                const attendees = (card.dataset.attendees || '').toLowerCase();
                const desc = (card.dataset.desc || '').toLowerCase();
                if (title.includes(q) || reporter.includes(q) || attendees.includes(q) || desc.includes(q)) {
                    card.classList.add('search-hit');
                }
            });
            // 搜索日历格子（按日期匹配）
            document.querySelectorAll('.cell-unit[data-date]').forEach(cell => {
                const dateStr = cell.dataset.date || '';
                const d = new Date(dateStr);
                const dateStrCN = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
                if (dateStr.includes(q) || dateStrCN.toLowerCase().includes(q)) {
                    cell.classList.add('search-hit');
                }
            });
        }

        // --- 冲突检测 ---
        let conflictMode = false;
        function toggleConflictHighlight() {
            conflictMode = !conflictMode;
            const btn = document.getElementById('conflict-btn');
            if (conflictMode) {
                btn.classList.add('active');
                applyConflictHighlight();
            } else {
                btn.classList.remove('active');
                clearConflictHighlight();
            }
        }

        function findConflicts() {
            const conflictDates = new Set();
            for (const [dateStr, events] of Object.entries(STORAGE_CORE)) {
                const sorted = [...events].sort((a,b) => timeToMin(a.start) - timeToMin(b.start));
                for (let i = 0; i < sorted.length; i++) {
                    for (let j = i+1; j < sorted.length; j++) {
                        if (timeToMin(sorted[j].start) < timeToMin(sorted[i].end)) {
                            conflictDates.add(dateStr);
                        }
                    }
                }
            }
            return [...conflictDates];
        }

        function applyConflictHighlight() {
            clearConflictHighlight();
            const conflictDates = findConflicts();
            conflictDates.forEach(dateStr => {
                document.querySelectorAll(`.cell-unit[data-date="${dateStr}"]`).forEach(cell => {
                    cell.classList.add('conflict');
                });
            });
            if (conflictDates.length > 0) {
                showImportToast(`⚠️ 检测到 ${conflictDates.length} 个日期存在时间冲突`, 'error');
            }
        }

        function clearConflictHighlight() {
            document.querySelectorAll('.cell-unit.conflict').forEach(el => {
                el.classList.remove('conflict');
            });
        }

        // --- 悬停气泡 ---
        const tooltipEl = document.createElement('div');
        tooltipEl.className = 'cell-tooltip';
        document.body.appendChild(tooltipEl);

        function showCellTooltip(cell, dateStr) {
            const rect = cell.getBoundingClientRect();
            const events = STORAGE_CORE[dateStr] || [];
            const date = new Date(`${dateStr}T12:00:00`);
            const meta = getCalendarMeta(dateStr, date);
            let html = `<div class="tooltip-date">${dateStr}${meta.lunar ? ` · 农历${escapeHtml(meta.lunar)}` : ''}</div>`;
            if (meta.holidays.length) html += meta.holidays.map(item => `<div class="tooltip-event ${item.type === 'workday' ? 'work' : 'urgent'}"><span class="dot"></span>${item.country === 'CN' ? '🇨🇳' : '🇪🇬'} ${escapeHtml(currentLang === 'zh' ? item.name : item.nameEn)}</div>`).join('');
            if (events.length === 0) {
                html += `<div class="tooltip-empty">无日程</div>`;
            } else {
                events.sort((a,b) => timeToMin(a.start) - timeToMin(b.start)).forEach(ev => {
                    const dotClass = ev.type === 'urgent' ? 'urgent' : 'work';
                    html += `<div class="tooltip-event ${dotClass}"><span class="dot"></span>${escapeHtml(ev.start)} ${escapeHtml(ev.title)}</div>`;
                });
            }
            tooltipEl.innerHTML = html;
            tooltipEl.classList.add('show');

            // 定位：优先下方，不够则上方，较大偏移量避免遮挡格子
            let top = rect.bottom + 20;
            let left = rect.left + rect.width / 2 - 90;
            tooltipEl.style.top = top + 'px';
            tooltipEl.style.left = Math.max(8, left) + 'px';
            tooltipEl.style.transform = 'translateY(0)';
            // 超出底部则翻转到上方
            if (top + tooltipEl.offsetHeight > window.innerHeight - 8) {
                tooltipEl.style.top = (rect.top - tooltipEl.offsetHeight - 20) + 'px';
                tooltipEl.style.transform = 'translateY(0)';
            }
        }

            tooltipEl.classList.remove('show');

        // --- 工具函数 ---
        function getWeekNumber(date) {
            const d = new Date(date);
            d.setHours(0, 0, 0, 0);
            d.setDate(d.getDate() + 4 - (d.getDay() || 7));
            const yearStart = new Date(d.getFullYear(), 0, 1);
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        function getDayOfYear(date) {
            const d = new Date(date);
            const start = new Date(d.getFullYear(), 0, 0);
            return Math.floor((d - start) / 86400000);
        }

        function getBusynessClass(dateStr) {
            const count = (STORAGE_CORE[dateStr] || []).length;
            if (count === 0) return "status-free";
            if (count <= 2) return "status-light";

        function switchView(viewMode) {
            currentView = viewMode;

        function navigateCalendar(dir) {
            if (currentView === 'month') anchorDate.setMonth(anchorDate.getMonth() + dir);
            else if (currentView === 'year') anchorDate.setFullYear(anchorDate.getFullYear() + dir);
            else if (currentView === 'week') anchorDate.setDate(anchorDate.getDate() + dir * 7);
            renderCalendarPart();

        // --- 三级无缝数据渲染引擎 ---
        function renderCalendarPart(targetContainer = container) {
            const frag = document.createDocumentFragment();
            const d = I18N_DICT[currentLang];

            if (currentView === 'month') {
                headline.innerText = currentLang === 'zh'
                    ? `${anchorDate.getFullYear()}年 ${String(anchorDate.getMonth()+1).padStart(2,'0')}月`
                    : `${d.months[anchorDate.getMonth()]} ${anchorDate.getFullYear()}`;

                const wrapper = document.createElement('div');
                wrapper.className = 'grid-animate-wrapper month-calendar-wrapper';

                const weekRow = document.createElement('div');
                weekRow.className = 'week-days-line';
                d.weekdays.forEach(w => weekRow.appendChild(Object.assign(document.createElement('div'), {textContent: w})));
                wrapper.appendChild(weekRow);

                const grid = document.createElement('div');
                grid.className = 'universal-grid grid-month';

                let temp = new Date(anchorDate.getFullYear(), anchorDate.getMonth(), 1);
                const firstDayIdx = temp.getDay();
                const lastDay = new Date(anchorDate.getFullYear(), anchorDate.getMonth() + 1, 0).getDate();
                const prevLastDay = new Date(anchorDate.getFullYear(), anchorDate.getMonth(), 0).getDate();

                for (let x = firstDayIdx; x > 0; x--) {
                    const cell = document.createElement('div');
                    cell.className = 'cell-unit sibling';
                    cell.textContent = prevLastDay - x + 1;
                    grid.appendChild(cell);
                }
                for (let i = 1; i <= lastDay; i++) {
                    const d = new Date(anchorDate.getFullYear(), anchorDate.getMonth(), i);
                    const dStr = `${anchorDate.getFullYear()}-${String(anchorDate.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                    const cell = document.createElement('div');
                    let cls = 'cell-unit';
                    if (dStr === selectedDateStr) cls += ' selected';
                    if (dStr === localDateString()) cls += ' today';
                    cell.className = cls;
                    cell.dataset.date = dStr;
                    cell.tabIndex = 0;
                    cell.setAttribute('role', 'button');
                    cell.setAttribute('aria-label', dStr);

                    const meta = getCalendarMeta(dStr, d);
                    if (meta.holidays.some(item => item.country === 'CN' && item.type === 'holiday')) cls += ' china-holiday';
                    if (meta.holidays.some(item => item.country === 'EG')) cls += ' egypt-holiday';
                    if (meta.holidays.some(item => item.type === 'workday')) cls += ' makeup-workday';
                    cell.className = cls;
                    if (meta.title) cell.title = meta.title;
                    cell.addEventListener('mouseenter', function() { showCellTooltip(this, dStr); });
                    cell.addEventListener('mouseleave', hideCellTooltip);
                    cell.innerHTML = `<span class="holiday-flags">${meta.flags}</span><span class="day-number">${i}</span><span class="lunar-label">${escapeHtml(meta.lunar)}</span><span class="busy-bar ${getBusynessClass(dStr)}"></span>`;
                    grid.appendChild(cell);
                }
                const renderedCells = firstDayIdx + lastDay;
                for (let i = 1; i <= 42 - renderedCells; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell-unit sibling';
                    cell.textContent = i;
                    grid.appendChild(cell);
                }
                wrapper.appendChild(grid);
                frag.appendChild(wrapper);

            } else if (currentView === 'year') {
                headline.innerText = currentLang === 'zh' ? `${anchorDate.getFullYear()}年度 看板` : `${d.yearHeadline} ${anchorDate.getFullYear()}`;
                const grid = document.createElement('div');
                grid.className = 'grid-animate-wrapper universal-grid grid-year';
                for (let m = 0; m < 12; m++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell-unit';
                    cell.textContent = d.months[m];
                    cell.addEventListener('click', () => { anchorDate.setMonth(m); switchView('month'); });
                    grid.appendChild(cell);
                }
                frag.appendChild(grid);

            } else if (currentView === 'week') {
                headline.innerText = currentLang === 'zh' ? `${anchorDate.getFullYear()}年 重点编排周` : `${d.weekHeadline}`;
                const grid = document.createElement('div');
                grid.className = 'grid-animate-wrapper universal-grid grid-week';

                let currentDayOfWeek = anchorDate.getDay();
                let startOfWeek = new Date(anchorDate);
                startOfWeek.setDate(anchorDate.getDate() - currentDayOfWeek);

                for (let dIdx = 0; dIdx < 7; dIdx++) {
                    let nextDay = new Date(startOfWeek);
                    nextDay.setDate(startOfWeek.getDate() + dIdx);
                    const dStr = `${nextDay.getFullYear()}-${String(nextDay.getMonth()+1).padStart(2,'0')}-${String(nextDay.getDate()).padStart(2,'0')}`;
                    let cls = 'cell-unit';
                    if (dStr === selectedDateStr) cls += ' selected';
                    if (dStr === localDateString()) cls += ' today';

                    const cell = document.createElement('div');
                    cell.className = cls;
                    cell.dataset.date = dStr;
                    cell.tabIndex = 0;
                    cell.setAttribute('role', 'button');
                    cell.setAttribute('aria-label', dStr);
                    const meta = getCalendarMeta(dStr, nextDay);
                    if (meta.holidays.some(item => item.country === 'CN' && item.type === 'holiday')) cell.classList.add('china-holiday');
                    if (meta.holidays.some(item => item.country === 'EG')) cell.classList.add('egypt-holiday');
                    if (meta.holidays.some(item => item.type === 'workday')) cell.classList.add('makeup-workday');
                    if (meta.title) cell.title = meta.title;
                    cell.addEventListener('mouseenter', function() { showCellTooltip(this, dStr); });
                    cell.addEventListener('mouseleave', hideCellTooltip);
                    cell.innerHTML = `<span class="holiday-flags">${meta.flags}</span><div class="week-left-desc"><span class="w-name">${d.weekTokens[dIdx]}</span><span class="day-number">${nextDay.getMonth()+1}/${nextDay.getDate()}</span><span class="lunar-label">${escapeHtml(meta.lunar)}</span></div><span class="busy-bar ${getBusynessClass(dStr)}"></span>`;
                    grid.appendChild(cell);

                frag.appendChild(grid);
