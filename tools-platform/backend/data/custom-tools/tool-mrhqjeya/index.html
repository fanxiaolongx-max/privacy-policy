            targetContainer.innerHTML = '';
            targetContainer.appendChild(frag);
            if (targetContainer === container) renderHolidayLegend();
        }

        // 统一事件代理：日历格子点击
        container.addEventListener('click', function(e) {
            const cell = e.target.closest('.cell-unit[data-date]');
            if (cell) selectDate(cell.dataset.date);
        });
        container.addEventListener('keydown', function(e) {
            const cell = e.target.closest('.cell-unit[data-date]');
            if (cell && (e.key === 'Enter' || e.key === ' ')) { e.preventDefault(); selectDate(cell.dataset.date); }
        });
        container.addEventListener('dragover', function(e) {
            if (e.target.closest('.cell-unit[data-date]')) e.preventDefault();
        });
        container.addEventListener('drop', function(e) {
            const cell = e.target.closest('.cell-unit[data-date]');
            if (!cell) return;
            e.preventDefault();
            try {
                const info = JSON.parse(e.dataTransfer.getData('application/json'));
                if (!info.id || !STORAGE_CORE[info.fromDate]) return;
                const index = STORAGE_CORE[info.fromDate].findIndex(event => event.id === info.id);
                if (index < 0) return;
                const [event] = STORAGE_CORE[info.fromDate].splice(index, 1);
                if (!STORAGE_CORE[cell.dataset.date]) STORAGE_CORE[cell.dataset.date] = [];
                STORAGE_CORE[cell.dataset.date].push(event);
                persist('拖拽调整日程');
                selectDate(cell.dataset.date);
                showImportToast('✅ 日程已移动', 'success');
            } catch (err) { console.warn('Drop schedule failed:', err); }
        });

        // 手机端横向手势：月视图切月、周视图切周、年视图切年
        let swipeStartX = 0, swipeStartY = 0, swipeStartedAt = 0;
        let swipeDeltaX = 0, swipeTracking = false, swipeHorizontal = false;
        let swipePreview = null, swipeCurrentLayer = null, swipePreviewDirection = 0;

        function shiftAnchorForPreview(direction) {
            if (currentView === 'month') anchorDate.setMonth(anchorDate.getMonth() + direction);
            else if (currentView === 'year') anchorDate.setFullYear(anchorDate.getFullYear() + direction);
            else anchorDate.setDate(anchorDate.getDate() + direction * 7);
        }

        function prepareSwipePreview(direction) {
            if (swipePreview && swipePreviewDirection === direction) return;
            if (swipePreview) swipePreview.remove();
            const originalAnchor = new Date(anchorDate);
            const originalHeadline = headline.textContent;
            shiftAnchorForPreview(direction);
            const detachedPreview = document.createElement('div');
            renderCalendarPart(detachedPreview);
            anchorDate = originalAnchor;
            headline.textContent = originalHeadline;
            swipeCurrentLayer = container.firstElementChild;
            swipePreview = document.createElement('div');
            swipePreview.className = 'calendar-swipe-preview';
            swipePreview.innerHTML = detachedPreview.innerHTML;
            swipePreviewDirection = direction;
            container.appendChild(swipePreview);
        }

        function clearSwipeLayers() {
            if (swipeCurrentLayer) { swipeCurrentLayer.style.transform=''; swipeCurrentLayer.style.opacity=''; }
            if (swipePreview) swipePreview.remove();
            swipePreview = null;
            swipeCurrentLayer = null;
            swipePreviewDirection = 0;
        }
        container.addEventListener('touchstart', e => {
            if (e.touches.length !== 1) return;
            swipeStartX = e.touches[0].clientX;
            swipeStartY = e.touches[0].clientY;
            swipeStartedAt = Date.now();
            swipeDeltaX = 0;
            swipeTracking = true;
            swipeHorizontal = false;
            container.getAnimations().forEach(animation => animation.cancel());
            clearSwipeLayers();
        }, { passive:true });

        container.addEventListener('touchmove', e => {
            if (!swipeTracking || e.touches.length !== 1) return;
            const dx = e.touches[0].clientX - swipeStartX;
            const dy = e.touches[0].clientY - swipeStartY;
            if (!swipeHorizontal) {
                if (Math.max(Math.abs(dx), Math.abs(dy)) < 12) return;
                if (Math.abs(dy) > Math.abs(dx) * 1.35) { swipeTracking = false; return; }
                if (Math.abs(dx) <= Math.abs(dy) * 1.05) return;
                swipeHorizontal = true;
            }
            e.preventDefault();
            const width = Math.max(container.clientWidth, 1);
            const direction = dx < 0 ? 1 : -1;
            prepareSwipePreview(direction);
            const resistance = 1 - Math.min(Math.abs(dx) / width, .65) * .18;
            swipeDeltaX = dx * resistance;
            const progress = Math.min(Math.abs(swipeDeltaX) / width, 1);
            if (swipeCurrentLayer) {
                swipeCurrentLayer.style.transform = `translate3d(${swipeDeltaX}px,0,0) scale(${1 - progress * .018})`;
                swipeCurrentLayer.style.opacity = String(1 - progress * .42);
            }
            if (swipePreview) {
                swipePreview.style.transform = `translate3d(${swipeDeltaX + direction * width}px,0,0) scale(${.985 + progress * .015})`;
                swipePreview.style.opacity = String(.18 + progress * .82);
            }
        }, { passive:false });

        function settleCalendarSwipe(changePage) {
            const width = Math.max(container.clientWidth, 1);
            const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
            const currentLayer = swipeCurrentLayer;
            const previewLayer = swipePreview;
            if (reduced) {
                const direction = swipeDeltaX < 0 ? 1 : -1;
                clearSwipeLayers();
                if (changePage) navigateCalendar(direction);
                return;
            }
            if (!changePage) {
                const back = currentLayer && currentLayer.animate([
                    { transform:currentLayer.style.transform, opacity:currentLayer.style.opacity || 1 },
                    { transform:'translate3d(0,0,0)', opacity:1 }
                ], { duration:220, easing:'cubic-bezier(.2,.8,.2,1)', fill:'forwards' });
                if (previewLayer) previewLayer.animate([
                    { transform:previewLayer.style.transform, opacity:previewLayer.style.opacity || .2 },
                    { transform:`translate3d(${swipePreviewDirection * width}px,0,0)`, opacity:0 }
                ], { duration:220, easing:'cubic-bezier(.2,.8,.2,1)', fill:'forwards' });
                if (back) back.onfinish = clearSwipeLayers; else clearSwipeLayers();
                return;
            }
            const direction = swipeDeltaX < 0 ? 1 : -1;
            const exitX = direction > 0 ? -width : width;
            const remaining = Math.max(0, width - Math.abs(swipeDeltaX));
            const duration = Math.max(110, Math.min(240, 110 + remaining / width * 100));
            const outgoing = currentLayer.animate([
                { transform:currentLayer.style.transform, opacity:currentLayer.style.opacity || 1 },
                { transform:`translate3d(${exitX}px,0,0) scale(.97)`, opacity:.35 }
            ], { duration, easing:'cubic-bezier(.22,.75,.25,1)', fill:'forwards' });
            if (previewLayer) previewLayer.animate([
                { transform:previewLayer.style.transform, opacity:previewLayer.style.opacity || .3 },
                { transform:'translate3d(0,0,0) scale(1)', opacity:1 }
            ], { duration, easing:'cubic-bezier(.22,.75,.25,1)', fill:'forwards' });
            outgoing.onfinish = () => {
                outgoing.cancel();
                clearSwipeLayers();
                navigateCalendar(direction);
            };
        }

        container.addEventListener('touchend', e => {
            const touch = e.changedTouches && e.changedTouches[0];
            if (!touch || !swipeTracking || !swipeHorizontal) { swipeTracking=false; return; }
            const elapsed = Math.max(Date.now() - swipeStartedAt, 1);
            const velocity = Math.abs(swipeDeltaX) / elapsed;
            const shouldChange = Math.abs(swipeDeltaX) >= Math.min(72, container.clientWidth * .2) || (velocity > .48 && Math.abs(swipeDeltaX) > 28);
            settleCalendarSwipe(shouldChange);
            swipeTracking = false;
            swipeHorizontal = false;
        }, { passive:true });
        container.addEventListener('touchcancel', () => {
            if (swipeHorizontal) settleCalendarSwipe(false);
            swipeTracking=false; swipeHorizontal=false;
        }, { passive:true });

        function jumpToMonth(m) { anchorDate.setMonth(m); switchView('month'); }

        function selectDate(dStr) {
            selectedDateStr = dStr;
            localStorage.setItem('EXEC_HORIZON_SELECTED_DATE', selectedDateStr);
            renderCalendarPart();
            renderTimelineBlock(dStr);
        }

        function eventMatchesFilters(event, dateStr) {
            const q = currentFilters.person.toLowerCase();
            if (currentFilters.type && event.type !== currentFilters.type) return false;
            if (currentFilters.from && dateStr < currentFilters.from) return false;
            if (currentFilters.to && dateStr > currentFilters.to) return false;
            if (q) {
                const haystack = [event.title, event.reporter, event.attendees, event.noteTaker, event.description].join(' ').toLowerCase();
                if (!haystack.includes(q)) return false;
            }
            return true;
        }

        function getFilteredEvents(dateStr) {
            return (STORAGE_CORE[dateStr] || []).filter(event => eventMatchesFilters(event, dateStr));
        }

        // --- 高精高管时间谱线架构引擎 ---
        function renderTimelineBlock(dateStr) {
            const [y, m, d] = dateStr.split('-');
            const dict = I18N_DICT[currentLang];
            timelineHeadline.innerText = currentLang === 'zh' ? `${m}月${d}日 ${dict.timelineTitle}` : `${dict.timelineTitle} (${m}/${d})`;
                        
            const rawEvents = getFilteredEvents(dateStr);
            const dayStart = timeToMin("08:30");
            const dayEnd = timeToMin("18:30");
                        
            let segments = [];
            if (rawEvents.length === 0) {
                segments.push({ start: "08:30", end: "18:30", title: dict.freeTime, type: "free", real: false });
            } else {
                const sorted = [...rawEvents].sort((a,b) => timeToMin(a.start) - timeToMin(b.start));
                let ptr = dayStart;
                sorted.forEach(ev => {
                    const evStart = timeToMin(ev.start);
                    const evEnd = timeToMin(ev.end);
                    if (evStart > ptr) {
                        segments.push({ start: minToTime(ptr), end: minToTime(evStart), title: dict.noMeeting, type: "free", real: false });
                    }
                    segments.push({ ...ev, real: true });
                    ptr = Math.max(ptr, evEnd);
                });
                if (ptr < dayEnd) {
                    segments.push({ start: minToTime(ptr), end: minToTime(dayEnd), title: dict.noMeeting, type: "free", real: false });
                }
            }

            let html = "";
            segments.forEach(seg => {
                const isFree = !seg.real;
                const cardAttrs = isFree
                    ? `data-start="${seg.start}" data-end="${seg.end}"`
                    : `data-id="${seg.id || ''}" data-title="${escapeHtml(seg.title || '')}" data-start="${seg.start || ''}" data-end="${seg.end || ''}" data-type="${seg.type || ''}" data-reporter="${escapeHtml(seg.reporter || '')}" data-attendees="${escapeHtml(seg.attendees || '')}" data-notetaker="${escapeHtml(seg.noteTaker || '')}" data-desc="${escapeHtml(seg.description || '')}" data-date="${dateStr || ''}"`;
                const cardClass = `schedule-meta-card node-${seg.type} ${isFree ? 'is-free' : 'is-real'}`;
                html += `
                    <div class="axis-node-row">
                        <div class="axis-time-label">${seg.start}</div>
                        <div class="axis-anchor-dot"></div>
                        <div class="${cardClass}" ${cardAttrs}>
                            <div class="card-row-head">
                                <div class="card-main-title">${escapeHtml(seg.title || '')}</div>
                                <div class="card-time-span">${seg.start} - ${seg.end}</div>
                            </div>
                            ${seg.reporter || seg.attendees ? `
                            <div class="card-meta-row">
                                ${seg.reporter ? `<span class="meta-tag">👤 ${escapeHtml(seg.reporter)}</span>` : ''}

        // ================= Excel 导入引擎 =================
        // ExcelJS 随工具包离线提供，避免外网依赖和旧 SheetJS 安全风险
        const EXCELJS_LOCAL = './assets/exceljs.min.js';
        let EXCELJS_LIB = null;

        function loadExcelJS() {
            return new Promise((resolve, reject) => {
                if (window.ExcelJS) { resolve(window.ExcelJS); return; }
                const s = document.createElement('script');
                s.src = EXCELJS_LOCAL;
                s.onload = () => resolve(window.ExcelJS);
                s.onerror = () => reject(new Error('Excel 解析组件不可用，请检查工具包 assets'));
                document.head.appendChild(s);
            });
        }

        function parseCSVText(text) {
            const rows=[]; let row=[], cell='', quoted=false;
            for(let i=0;i<text.length;i++) { const ch=text[i], next=text[i+1];
                if(ch==='"' && quoted && next==='"'){cell+='"';i++;}
                else if(ch==='"'){quoted=!quoted;}
                else if(ch===','&&!quoted){row.push(cell);cell='';}
                else if((ch==='\n'||ch==='\r')&&!quoted){if(ch==='\r'&&next==='\n')i++;row.push(cell);if(row.some(v=>v!==''))rows.push(row);row=[];cell='';}
                else cell+=ch;
            }
            row.push(cell); if(row.some(v=>v!==''))rows.push(row); return rows;
        }

        function eventIdentity(dateStr, event) {
            return [dateStr, event.start, event.end, String(event.title || '').trim().toLowerCase()].join('|');
        }

        function collectScheduleConflicts(extraEvents = []) {
            const byDate = {};
            Object.entries(STORAGE_CORE).forEach(([dateStr, events]) => {
                byDate[dateStr] = (events || []).map(event => ({ dateStr, ...event }));
            });
            extraEvents.forEach(event => {
                if (!byDate[event.dateStr]) byDate[event.dateStr] = [];
                byDate[event.dateStr].push(event);
            });
            const conflicts = [];
            Object.entries(byDate).forEach(([dateStr, events]) => {
                const sorted = events.slice().sort((a,b) => timeToMin(a.start) - timeToMin(b.start));
                for (let i=0; i<sorted.length; i++) for (let j=i+1; j<sorted.length; j++) {
                    if (timeToMin(sorted[j].start) >= timeToMin(sorted[i].end)) break;
                    conflicts.push({ dateStr, first: sorted[i], second: sorted[j] });
                }
            });
            return conflicts;
        }

        function showImportPreview(summary) {
            return new Promise(resolve => {
                const panel = document.createElement('div');
                panel.className = 'snapshot-panel show';
                panel.innerHTML = `<div class="snapshot-card" role="dialog" aria-modal="true">
                    <h3>导入预览</h3>
                    <div class="import-preview-list">新增 <b>${summary.added.length}</b> 条；重复 <b>${summary.duplicates.length}</b> 条；无效 <b>${summary.invalid}</b> 条；新增后冲突 <b>${summary.conflicts.length}</b> 组。<br>${summary.conflicts.slice(0,8).map(c => `${escapeHtml(c.dateStr)}：${escapeHtml(c.first.title)} ↔ ${escapeHtml(c.second.title)}`).join('<br>') || '未发现时间冲突'}</div>
                    <div class="m-actions"><button class="b-cancel" data-action="cancel">取消</button><button class="b-save" data-action="confirm">确认导入并跳过重复项</button></div>
                </div>`;
                document.body.appendChild(panel);
                panel.querySelector('[data-action="cancel"]').onclick = () => { panel.remove(); resolve(false); };
                panel.querySelector('[data-action="confirm"]').onclick = () => { panel.remove(); resolve(true); };
                panel.querySelector('[data-action="confirm"]').focus();
            });
        }

        // 绑定导入按钮
        document.getElementById('import-btn').addEventListener('click', () => {
            document.getElementById('excel-import-input').click();
        });

        document.getElementById('excel-import-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            try {
                let rows;
                if (/\.csv$/i.test(file.name)) {
                    rows = parseCSVText(await file.text());
                } else {
                    EXCELJS_LIB = await loadExcelJS();
                    const workbook = new EXCELJS_LIB.Workbook();
                    await workbook.xlsx.load(await file.arrayBuffer());
                    const sheet = workbook.worksheets[0];
                    if (!sheet) throw new Error('Excel 中没有工作表');
                    rows = [];
                    sheet.eachRow({ includeEmpty: false }, row => {
                        const values = [];
                        for (let i=1; i<=row.cellCount; i++) values.push(row.getCell(i).text || row.getCell(i).value || '');
                        rows.push(values);
                    });
                }

                if (rows.length < 2) {
                    showImportToast('文件内容为空或格式不正确', 'error');
                    return;
                }

                const headers = rows[0].map(h => String(h).trim());
                const imported = parseExcelRows(headers, rows.slice(1));
                if (imported.count === 0) {
                    showImportToast('未识别到有效的日程数据', 'error');
                    return;
                }

                const existingKeys = new Set();
                Object.entries(STORAGE_CORE).forEach(([dateStr, events]) => events.forEach(event => existingKeys.add(eventIdentity(dateStr, event))));
                const addedEvents = [];
                const duplicates = [];
                let skipped = 0;
                imported.events.forEach(ev => {
                    if (!ev.dateStr || !ev.title) { skipped++; return; }
                    const key = eventIdentity(ev.dateStr, ev);
                    if (existingKeys.has(key)) { duplicates.push(ev); return; }
                    existingKeys.add(key);
                    addedEvents.push(ev);
                });
                const preview = { added: addedEvents, duplicates, invalid: skipped, conflicts: collectScheduleConflicts(addedEvents) };
                if (!await showImportPreview(preview)) { e.target.value = ''; return; }

                let added = 0;
                addedEvents.forEach(ev => {
                    if (!STORAGE_CORE[ev.dateStr]) STORAGE_CORE[ev.dateStr] = [];
                    STORAGE_CORE[ev.dateStr].push({
                        id: Date.now().toString() + Math.random().toString(36).slice(2, 7),
                        start: ev.start,
                        end: ev.end,
                        title: ev.title,
                        type: ev.type,
                        reporter: ev.reporter,
                        attendees: ev.attendees,
                        noteTaker: ev.noteTaker,
                        description: ev.description
                    });
                    added++;
                });

                persist('Excel 导入前自动备份');
                renderCalendarPart();
                renderTimelineBlock(selectedDateStr);
                if (document.getElementById('import-panel').classList.contains('active')) {
                    renderImportTable();
                }
                e.target.value = '';
                showImportToast(`✅ 成功导入 ${added} 条，跳过 ${duplicates.length} 条重复、${skipped} 条无效数据`, 'success');
            } catch (err) {
                console.error(err);
                showImportToast(`导入失败：${err.message}`, 'error');
            }
        });

        // 从 Excel 行数据中解析日程
        function parseExcelRows(headers, rows) {
            // 找列索引：尝试多别名匹配
            const findCol = (aliases) => {
                for (const a of aliases) {
                    const idx = headers.findIndex(h =>
                        h.includes(a) || a.includes(h) ||
                        normalizeCN(h).includes(normalizeCN(a)) ||
                        normalizeCN(a).includes(normalizeCN(h))
                    );
                    if (idx !== -1) return idx;
                }
                return -1;
            };

            const colTitle    = findCol(['主题', 'title', '会议主题', '关键任务', '议题']);
            const colDate     = findCol(['日期', 'date', '预排汇报日期', '汇报日期', '会议日期']);
            const colTime     = findCol(['时间', 'time', '预排汇报时间', '汇报时间', '会议时间']);
            const colStart    = findCol(['开始时间', '起始时间', 'start time', 'start']);
            const colEnd      = findCol(['结束时间', '截止时间', 'end time', 'end']);
            const colDuration = findCol(['时长', 'duration', '预约时长', '会议时长', '小时']);
            const colStatus   = findCol(['状态', 'status', '材料准备状态', '准备状态']);
            const colType     = findCol(['类型', 'type', '性质', '级别', '紧急']);
            const colReporter = findCol(['汇报人', '汇报人', '报告人', '报告人', 'reporter', 'presenter']);
            const colAttendees = findCol(['参会人', '参会人', '参会', 'participants', 'attendees', 'invitees']);
            const colNoteTaker = findCol(['纪要人', '纪要', '记要', 'notetaker', 'note', 'recorder']);
            const colDesc     = findCol(['背景', '说明', '议题背景', '决策要点', 'description', 'detail', 'context']);

            const events = [];
            rows.forEach((row, rowIdx) => {
                if (!row || row.length === 0 || !row.some(c => c !== '')) return;

                // --- 标题 ---
                let title = colTitle !== -1 ? String(row[colTitle] || '').trim() : '';
                if (!title) return;

                // --- 日期解析 ---
                let dateStr = colDate !== -1 ? parseExcelDate(row[colDate]) : '';
                if (!dateStr) return; // 无有效日期则跳过

                // --- 时间解析 ---
                let start = '09:00', end = '10:00';
                if (colStart !== -1 || colEnd !== -1) {
                    if (colStart !== -1) {
                        const parsedStart = parseExcelTime(row[colStart]);
                        if (parsedStart.start) start = parsedStart.start;
                    }
                    if (colEnd !== -1) {
                        const parsedEnd = parseExcelTime(row[colEnd]);
                        if (parsedEnd.start) end = parsedEnd.start;
                    }
                } else if (colTime !== -1) {
                    const t = parseExcelTime(row[colTime]);
                    if (t.start) start = t.start;
                    if (t.end) end = t.end;
                } else if (colDuration !== -1) {
                    // 根据时长推算结束时间
                    const dur = parseFloat(row[colDuration]) || 1;
                    const startMin = timeToMin(start);
                    const endMin = startMin + Math.round(dur * 60);
                    end = minToTime(Math.min(endMin, 23 * 60));
                }

                // --- 类型判断 ---
                let type = 'work';
                if (colType !== -1) {
                    const t = String(row[colType] || '');
                    if (t.includes('urgent') || t.includes('紧急') || t.includes('重要') || t.includes('关键')) {
                        type = 'urgent';
                    }
                }
                // 如果标题含 Urgent 关键字也标记
                if (title.toLowerCase().includes('urgent') || title.includes('【紧急】') || title.includes('【重要】')) {
                    type = 'urgent';
                }
                // 状态列含"已发送"等 → work 类型
                if (colStatus !== -1 && String(row[colStatus]).includes('已发')) {
                    type = 'work';
                }

                const reporter = colReporter !== -1 ? String(row[colReporter] || '').trim() : '';
                const attendees = colAttendees !== -1 ? String(row[colAttendees] || '').trim() : '';
                const noteTaker = colNoteTaker !== -1 ? String(row[colNoteTaker] || '').trim() : '';
                const description = colDesc !== -1 ? String(row[colDesc] || '').trim().replace(/\n/g, ' ') : '';

                events.push({ dateStr, start, end, title, type, reporter, attendees, noteTaker, description });
            });

            return { events, count: events.length };
        }

        // 繁简统一
        function normalizeCN(s) {
            return String(s).replace(/[^一-龥a-z0-9]/gi, '').toLowerCase();
        }

        // Excel 日期序列号 → YYYY-MM-DD
        function parseExcelDate(val) {
            if (!val && val !== 0) return '';
            // 已经是 Date 对象
            if (val instanceof Date) {
                if (isNaN(val.getTime())) return '';
                return formatDateObj(val);
            }
            // 数字 → Excel 序列日 (1900基准，补偿1900-02-29错误)
            if (typeof val === 'number' || !isNaN(Number(val))) {
                const n = Number(val);
                const d = new Date(Math.round((n - 25569) * 86400 * 1000));
                if (isNaN(d.getTime())) return '';
                return formatDateObj(d);
            }
            // 字符串格式
            const s = String(val).trim();
            if (!s) return '';
            // YYYY-MM-DD
            if (/^\d{4}-\d{1,2}-\d{1,2}/.test(s)) return s.slice(0, 10);
            // YYYY/MM/DD
            if (/^\d{4}\/\d{1,2}\/\d{1,2}/.test(s)) return s.slice(0, 10).replace(/\//g, '-');
            // 中文日期: 2026年7月9日 / 2026/7/9 / 2026.7.9
            const cnMatch = s.match(/(\d{4})[年\/\-\.](\d{1,2})[月\/\-\.](\d{1,2})/);
            if (cnMatch) {
                return `${cnMatch[1]}-${String(cnMatch[2]).padStart(2,'0')}-${String(cnMatch[3]).padStart(2,'0')}`;
            }
            // 其他尝试 Date.parse
            const parsed = Date.parse(s);
            if (!isNaN(parsed)) {
                return formatDateObj(new Date(parsed));
            }
            return '';
        }

        function formatDateObj(d) {
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        // 时间字符串解析，返回 { start, end }
        function parseExcelTime(val) {
            if (!val) return {};
            const s = String(val).trim();
            if (!s) return {};

            let start = '', end = '';

            // 格式: HH:MM-HH:MM / HH:MM:SS-HH:MM:SS
            const rangeMatch = s.match(/(\d{1,2}):(\d{2})(?::\d{2})?\s*[-~至]\s*(\d{1,2}):(\d{2})(?::\d{2})?/);
            if (rangeMatch) {
                start = `${String(rangeMatch[1]).padStart(2,'0')}:${rangeMatch[2]}`;
                end   = `${String(rangeMatch[3]).padStart(2,'0')}:${rangeMatch[4]}`;
                return { start, end };
            }

            // 格式: HH:MM
            const singleMatch = s.match(/^(\d{1,2}):(\d{2})/);
            if (singleMatch) {
                start = `${String(singleMatch[1]).padStart(2,'0')}:${singleMatch[2]}`;
                // 有时长字段时会自动推算，这里只设 start
                return { start };
            }

            // 中文时间词: 下午2点 / 下午2:30 / 14:30
            const cnTimeMatch = s.match(/(\d{1,2}):?(\d{2})?\s*(pm|am|上午|下午|早上|晚上|点|时)/i);
            if (cnTimeMatch) {
                let h = parseInt(cnTimeMatch[1], 10);
                const m = cnTimeMatch[2] ? parseInt(cnTimeMatch[2], 10) : 0;
                const isPM = /pm|下午|晚上/i.test(s);
                const isAM = /am|上午|早上/i.test(s);
                if (isPM && h < 12) h += 12;
                if (isAM && h === 12) h = 0;
                start = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
                return { start };
            }

            // 纯中文词: 4pm / 9点半 / 下午三点
            const cnMatch = s.match(/(上午|下午|早上|晚上|中午|下午)?\s*(\d{1,2})\s*(点|时|点半)?(\d{1,2})?/);
            if (cnMatch) {
                let h = parseInt(cnMatch[2], 10);
                const isPM = /下午|晚上/.test(cnMatch[1] || '');
                if (isPM && h < 12) h += 12;
                const m = cnMatch[4] ? parseInt(cnMatch[4], 10) : 0;
                start = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
                return { start };
            }

            return {};
        }

            const tbody = document.getElementById('import-tbody');

            const emptyState = document.getElementById('import-empty-state');
            const summary = document.getElementById('import-summary');

            // 收集所有日期的日程，按日期排序
            const allEvents = [];
            for (const [dateStr, events] of Object.entries(STORAGE_CORE)) {
                events.filter(ev => eventMatchesFilters(ev, dateStr)).forEach(ev => allEvents.push({ dateStr, ...ev }));
            }

            if (allEvents.length === 0) {
                table.style.display = 'none';
                summary.style.display = 'none';
                emptyState.style.display = '';
                return;
            }

            allEvents.sort((a, b) => {
                const dateCmp = a.dateStr.localeCompare(b.dateStr);
                if (dateCmp !== 0) return dateCmp;
                return timeToMin(a.start) - timeToMin(b.start);
            });

            // 统计
            const urgentCount = allEvents.filter(e => e.type === 'urgent').length;
            const workCount = allEvents.filter(e => e.type === 'work').length;
            const dateSet = new Set(allEvents.map(e => e.dateStr));
            document.getElementById('stat-total').textContent = allEvents.length;
            document.getElementById('stat-urgent').textContent = urgentCount;
            document.getElementById('stat-work').textContent = workCount;
            document.getElementById('stat-dates').textContent = dateSet.size;
            summary.style.display = '';
            emptyState.style.display = 'none';
            table.style.display = '';

            tbody.innerHTML = '';

            const allReporters = [...new Set(allEvents.map(e => e.reporter).filter(Boolean))];
            const allAttendees = [...new Set(allEvents.map(e => e.attendees).filter(Boolean))];
            const allNoteTakers = [...new Set(allEvents.map(e => e.noteTaker).filter(Boolean))];
            const allPeople = [...new Set([...allReporters, ...allAttendees, ...allNoteTakers])];

            const colorPalette = [
                'rgba(99,102,241,1)',     /* 靛蓝 */
                'rgba(16,185,129,1)',     /* 翠绿 */
                'rgba(245,158,11,1)',     /* 琥珀 */

                // 人员格子同色字体

                const attColor = ev.attendees && personColorMap[ev.attendees] ? personColorMap[ev.attendees] : '';

                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const state = await res.json();
                remoteSyncEnabled = true;
                const remoteData = state.data && Object.keys(state.data).length ? state.data : null;
                if (remoteData) {
                    STORAGE_CORE = remoteData;
                    localStorage.setItem('EXEC_HORIZON_DATA', JSON.stringify(STORAGE_CORE));
                    setSyncState('已从服务端同步', 'ok');
                } else if (Object.keys(localData).length) {
                    STORAGE_CORE = localData;
                    await saveRemoteState('首次从浏览器迁移', false);
                    setSyncState('本机数据已迁移', 'ok');
                } else {
                    setSyncState('服务端同步已启用', 'ok');
                }
            } catch (err) {
                remoteSyncEnabled = false;
                setSyncState(authHeaders().Authorization ? '服务端不可用，本机模式' : '公开访问·本机模式', authHeaders().Authorization ? 'error' : '');
            }
            renderCalendarPart();
            renderTimelineBlock(selectedDateStr);
            refreshConflictSummary();
        }
        initializeScheduleApp();

        document.addEventListener('keydown', e => {
            if (e.key !== 'Escape') return;
            if (document.getElementById('snapshot-panel').classList.contains('show')) closeSnapshots();
            else if (overlay.classList.contains('show')) closeModal();
            else hideContextMenu();
        });
        overlay.addEventListener('mousedown', e => { if (e.target === overlay) closeModal(); });
        document.getElementById('snapshot-panel').addEventListener('mousedown', e => { if (e.target.id === 'snapshot-panel') closeSnapshots(); });

        // ========== 动画初始化 ==========

        // 按钮涟漪效果
        document.addEventListener('mousedown', function(e) {
            const btn = e.target.closest('.ripple-btn, .view-btn, .sys-toggle-btn, .nav-btn, .btn-nav-today, .btn-trigger-add, .b-cancel, .b-save, .b-del, .import-tab-btn, .btn-export, .btn-clear');
            if (!btn || btn.classList.contains('no-ripple')) return;
            const circle = document.createElement('span');
            circle.className = 'ripple-circle';
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            circle.style.cssText = `position:absolute;border-radius:50%;background:rgba(255,255,255,0.25);width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px;pointer-events:none;`;
            // 用绝对定位的wrapper包裹，避免修改原按钮样式
            const wrap = document.createElement('span');
            wrap.style.cssText = 'position:absolute;inset:0;overflow:hidden;border-radius:inherit;pointer-events:none;';
            wrap.appendChild(circle);
            btn.style.position = 'relative';
            btn.appendChild(wrap);
            circle.animate([{transform:'scale(0)',opacity:1},{transform:'scale(4)',opacity:0}], {duration:600,easing:'ease-out'}).onfinish = () => { wrap.remove(); };
        });

        // Tab 滑动指示器
        const viewSwitcher = document.querySelector('.view-switcher');
        if (viewSwitcher) {
            viewSwitcher.dataset.activeIdx = '1'; // 默认月视图在第二位
        }
        function updateTabSlider() {
            const switcher = document.querySelector('.view-switcher');
            if (!switcher) return;
            const btns = switcher.querySelectorAll('.view-btn');
            const activeBtn = switcher.querySelector('.view-btn.active');
            if (!activeBtn) return;
            const switcherRect = switcher.getBoundingClientRect();
            const activeRect = activeBtn.getBoundingClientRect();
            const indicator = switcher._indicator || (switcher._indicator = document.createElement('div'));
            indicator.style.cssText = `
                position: absolute; bottom: 0; height: 2px;
                background: var(--primary); border-radius: 2px;
                transition: left 0.35s var(--ease-out-expo), width 0.35s var(--ease-out-expo);
                pointer-events: none; z-index: 1;
            `;
            if (!switcher._indicator.parentNode) switcher.style.position = 'relative', switcher.appendChild(indicator);
            indicator.style.left = (activeRect.left - switcherRect.left) + 'px';
            indicator.style.width = activeRect.width + 'px';
        }

        const observer = new MutationObserver(updateTabSlider);
        document.querySelectorAll('.view-switcher').forEach(sw => {
            observer.observe(sw, { childList: true, subtree: true });
        });
        // 初始和每次切换都更新
        const origSwitchView = window.switchView;
        window.switchView = function(v) {
            if (origSwitchView) origSwitchView.apply(this, arguments);
            setTimeout(updateTabSlider, 50);
        };
        setTimeout(updateTabSlider, 100);
        window.addEventListener('resize', updateTabSlider);
    </script>
</body>
</html>
