<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的旅行行程规划</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
        }

        /* 左侧面板：行程列表 */
        #sidebar {
            width: 350px;
            background: white;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        h2 {
            margin-top: 0;
            color: #333;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }

        button {
            padding: 10px 15px;
            background-color: #4285F4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #3367D6;
        }

        /* 行程列表样式 */
        #itinerary-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex: 1;
        }

        .itinerary-item {
            padding: 15px;
            background: #f9f9f9;
            border-left: 4px solid #4285F4;
            margin-bottom: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            background-color: #EA4335;
            padding: 5px 10px;
            font-size: 12px;
        }

        .delete-btn:hover {
            background-color: #C5221F;
        }

        /* 右侧地图容器 */
        #map {
            flex: 1;
            height: 100%;
        }

        .loading {
            font-size: 12px;
            color: #666;
            display: none;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>📍 行程规划助手</h2>
        <div class="input-group">
            <input type="text" id="place-input" placeholder="输入城市或景点 (如: 巴黎铁塔)">
            <button onclick="addLocation()">添加</button>
        </div>
        <div id="loading-msg" class="loading">正在搜索地图坐标，请稍候...</div>
        
        <ul id="itinerary-list">
            </ul>
    </div>

    <div id="map"></div>

    <script>
        // 1. 初始化地图，默认中心点设为北京
        const map = L.map('map').setView([39.9042, 116.4074], 4);

        // 2. 加载 OpenStreetMap 瓦片（真实的地图底图）
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // 全局变量，用于存储路线坐标和地图标记
        let waypoints = [];
        let markers = [];
        let polyline = L.polyline([], {color: '#4285F4', weight: 4}).addTo(map);

        // 3. 添加地点的核心功能
        async function addLocation() {
            const input = document.getElementById('place-input');
            const placeName = input.value.trim();
            const loadingMsg = document.getElementById('loading-msg');

            if (!placeName) {
                alert("请输入地点名称！");
                return;
            }

            loadingMsg.style.display = 'block';

            try {
                // 使用 Nominatim API 将地点名称转换为经纬度 (Geocoding)
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(placeName)}`);
                const data = await response.json();

                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    const latlng = [lat, lon];
                    const displayName = data[0].display_name.split(',')[0]; // 取简短名称

                    // 添加标记点到地图
                    const marker = L.marker(latlng).addTo(map)
                        .bindPopup(`<b>${placeName}</b><br>${displayName}`)
                        .openPopup();
                    
                    // 存储数据
                    markers.push(marker);
                    waypoints.push(latlng);

                    // 更新连线并调整地图视野
                    updateRoute();

                    // 添加到左侧列表
                    addToList(placeName, markers.length - 1);

                    input.value = ''; // 清空输入框
                } else {
                    alert("地图上找不到该地点，请尝试输入更详细的名称。");
                }
            } catch (error) {
                console.error("搜索出错:", error);
                alert("搜索出错，请检查网络连接。");
            } finally {
                loadingMsg.style.display = 'none';
            }
        }

        // 4. 更新路线并在地图上绘制连线
        function updateRoute() {
            polyline.setLatLngs(waypoints);
            if (waypoints.length > 0) {
                // 自动缩放地图以适应所有标记点
                map.fitBounds(L.latLngBounds(waypoints), {padding: [50, 50]});
            }
        }

        // 5. 将地点添加到左侧的行程列表中
        function addToList(name, index) {
            const list = document.getElementById('itinerary-list');
            const li = document.createElement('li');
            li.className = 'itinerary-item';
            li.id = `item-${index}`;
            
            li.innerHTML = `
                <span>Day ${index + 1}: <b>${name}</b></span>
                <button class="delete-btn" onclick="removeLocation(${index})">删除</button>
            `;
            list.appendChild(li);
        }

        // 6. 删除地点（由于简化版逻辑，删除后会重置列表顺序）
        function removeLocation(index) {
            // 从地图上移除标记
            map.removeLayer(markers[index]);
            
            // 清空旧数据，重新生成（避免索引错乱）
            markers.splice(index, 1);
            waypoints.splice(index, 1);
            
            // 重新绘制路线
            updateRoute();
            
            // 重新渲染列表
            renderList();
        }

        // 重新渲染列表的辅助函数
        function renderList() {
            const list = document.getElementById('itinerary-list');
            list.innerHTML = '';
            markers.forEach((marker, index) => {
                // 从 marker 的 popup 中提取名字
                const nameMatch = marker.getPopup().getContent().match(/<b>(.*?)<\/b>/);
                const name = nameMatch ? nameMatch[1] : `地点 ${index + 1}`;
                addToList(name, index);
            });
        }
    </script>
</body>
</html>
