name: Build Desktop App

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Trigger build on version tags like v1.0.0
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
      release_tag: ${{ steps.version.outputs.release_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF_NAME}"
            release_version="${release_tag#v}"
            echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          cd tools-platform
          npm version patch --no-git-tag-version --ignore-scripts
          release_version="$(node -p "require('./package.json').version")"
          cd ..
          release_tag="v${release_version}"

          if git rev-parse "${release_tag}" >/dev/null 2>&1; then
            echo "Tag ${release_tag} already exists. Bump tools-platform/package.json manually or delete the existing tag." >&2
            exit 1
          fi

          git add tools-platform/package.json tools-platform/package-lock.json
          git commit -m "chore: release ${release_tag} [skip ci]"
          git tag "${release_tag}"
          git push origin HEAD:main
          git push origin "${release_tag}"

          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare-release
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        working-directory: tools-platform
        run: npm install

      - name: Build Application (Windows)
        working-directory: tools-platform
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-app-windows
          path: |
            tools-platform/dist/*.exe
            tools-platform/dist/*.yml
            tools-platform/dist/*.blockmap

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          name: ${{ needs.prepare-release.outputs.release_tag }}
          files: |
            tools-platform/dist/*.exe
            tools-platform/dist/*.yml
            tools-platform/dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
